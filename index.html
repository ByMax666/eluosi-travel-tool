<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿杜俄旅 · 产品定制与报价核算系统 v0.32</title>
<style>
:root{--primary:#A93226;--primary-light:#E4B1A0;--bg:#FAF9F5;--card:#fff;--text:#3f3f3f;--border:#dfdfdf;--success:#27ae60;--warning:#f39c12;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:20px}
.container{max-width:1260px;margin:0 auto}
.header{text-align:center;padding:28px 20px;background:linear-gradient(135deg,#A93226,#CD5C5C);color:#fff;border-radius:20px;margin-bottom:20px;position:relative;overflow:hidden}
.header h1{font-size:26px;margin-bottom:6px}
.header p{font-size:13px;opacity:.9}
.card{background:var(--card);border-radius:16px;padding:18px 22px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card h2{font-size:17px;color:var(--primary);margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid var(--primary-light);display:flex;align-items:center;gap:8px}
.section-title{font-size:15px;font-weight:600;margin:14px 0 10px;color:var(--text)}
.form-row{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px}
.form-group{flex:1;min-width:160px}
.form-group label{display:block;font-size:12px;font-weight:600;margin-bottom:3px;color:#666}
.form-group input,.form-group select{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:#fff;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#8B1A1A}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#1e8449}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}
.btn-outline:hover{background:var(--primary-light)}
.btn-danger{background:#e74c3c;color:#fff}
.btn-danger:hover{background:#c0392b}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

.city-grid{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.city-chip{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:1.5px solid var(--border);transition:all .2s;background:#fff;user-select:none}
.city-chip.selected{background:var(--primary);color:#fff;border-color:var(--primary)}
.city-chip input{display:none}
.city-day-input{display:flex;align-items:center;gap:4px}
.city-day-input input{width:40px;text-align:center;padding:3px;border:1px solid var(--border);border-radius:4px;font-size:12px}

.day-card{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#f8f4f0;cursor:pointer;user-select:none;gap:8px}
.day-header .day-num{color:var(--primary);font-weight:700;min-width:60px}
.day-header .day-city{font-size:12px;color:#888;min-width:50px}
.day-header .day-theme{flex:1;font-size:13px}
.day-header .day-toggle{font-size:12px;color:#999}
.day-body{padding:14px;display:none}
.day-body.open{display:block}
.day-body .ctrl-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;align-items:end}
.day-body .ctrl-row .fg{flex:1;min-width:100px}
.day-body .ctrl-row .fg label{font-size:11px;color:#888;display:block;margin-bottom:2px}
.day-body .ctrl-row .fg input,.day-body .ctrl-row .fg select{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px}

.attr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:4px;margin:6px 0}
.attr-item{display:flex;align-items:center;gap:5px;font-size:12px;padding:3px 6px;border-radius:5px;cursor:pointer;transition:background .15s}
.attr-item:hover{background:#fdf0ed}
.attr-item input{accent-color:var(--primary)}
.attr-price{font-size:10px;color:#aaa}
.attr-badge{font-size:9px;padding:1px 5px;border-radius:4px;background:#f0ece8;color:#666;margin-left:2px}

.selected-attrs{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
.selected-attrs .tag{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;background:var(--primary-light);color:var(--primary);border-radius:12px;font-size:11px;font-weight:500}
.selected-attrs .tag .del{cursor:pointer;font-size:13px;line-height:1;margin-left:2px;color:#888}
.selected-attrs .tag .del:hover{color:#e74c3c}

.meal-row{display:flex;gap:16px;flex-wrap:wrap;margin:6px 0;align-items:center}
.meal-row label{font-size:12px;display:flex;align-items:center;gap:4px}
.meal-row select{font-size:11px;padding:3px 6px;border:1px solid var(--border);border-radius:4px}

.qt{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
.qt th,.qt td{padding:10px 14px;text-align:right;border-bottom:1px solid var(--border)}
.qt th{background:#f8f4f0;text-align:center;font-weight:600}
.qt td:first-child{text-align:left}
.qt .tr-total{font-weight:700;background:#fdf0ed;font-size:14px;color:var(--primary)}.qt tr:last-child td{border-bottom:none}.qt tr:hover td{background:#fff8f5}
.qt .tr-sub{color:#666;font-size:12px}

.output-box{margin-top:16px;padding:24px 30px;background:#fff;border:1px solid #e0d8d0;border-radius:8px;display:none;font-size:13px;line-height:1.8;max-height:700px;overflow-y:auto;white-space:pre-wrap;font-family:Menlo,Consolas,monospace;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.output-box.open{display:block}

.form-row{flex-direction:column}.form-group{min-width:100%}}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.chat-panel .chat-msg{max-width:88%;padding:10px 16px;border-radius:14px;font-size:13px;line-height:1.6;animation:mi .3s ease}
@keyframes mi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.chat-panel .chat-u{background:#A93226;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-panel .chat-a{background:#fff;color:#2C2C2C;align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.ct{display:flex;gap:4px;padding:10px 16px;align-items:center;align-self:flex-start;background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.ct .d{width:7px;height:7px;border-radius:50%;background:#ccc;animation:dp 1.2s infinite}
.ct .d:nth-child(2){animation-delay:.2s}.ct .d:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,60%,100%{transform:scale(1);opacity:.4}30%{transform:scale(1.3);opacity:1}}


@media print{.no-print{display:none!important}body{padding:0;background:#fff}.card{box-shadow:none;border:1px solid #ddd}.header{background:#A93226!important;-webkit-print-color-adjust:exact}.output-box{max-height:none!important}}

#adminSettings{background:linear-gradient(135deg,#FFF9F5,#FFF5F0)!important;border-color:rgba(169,50,38,0.12)!important}
</style>
</head>

const CITY_NAMES = { moscow:'莫斯科', spb:'圣彼得堡', tula:'图拉', sergiev:'谢尔盖耶夫', suzdal:'苏兹达里+弗拉基米尔' };
const CLIENT_NAMES = { family:'家庭团', group:'常规团', vip:'VIP精品团' };
const VEHICLE_NAMES = { bus:'大巴(35-40座)', minibus:'中巴(18座)', sedan:'轿车/商务车' };
const HOTEL_NAMES = { 3:'★★★三星', 4:'★★★★四星', 5:'★★★★★五星' };
const WEEKDAYS = ['日','一','二','三','四','五','六'];

// ===== 核心状态 =====
let dayData = [];        // Array of day objects
let selectedCities = []; // Currently selected cities

// ===== 读取表单值 =====
function $g(id){return document.getElementById(id)}
function people(){return parseInt($g('f_people').value)||5}
function days(){return parseInt($g('f_days').value)||9}
function hotelStar(){return parseInt($g('f_hotel').value)||4}
function vehicle(){return $g('f_vehicle').value}
function isPeak(){return $g('f_peak').value==='1'}
function peakMul(){return isPeak()?1.15:1}
function hotelCost(){return PRICE.hotel[hotelStar()]}
function guideHotel(){return PRICE.guideHotel[hotelStar()]}
function driverHotel(){return PRICE.driverHotel[hotelStar()]}
function vehCost(){return PRICE.vehicle[vehicle()]}

// ===== 城市选择 =====
function initCities(){
  const g=$g('cityGrid');
  g.innerHTML=Object.entries(CITY_NAMES).map(([k,v])=>
    `<div class="city-chip${selectedCities.includes(k)?' selected':''}" data-city="${k}" onclick="toggleCity('${k}')">
      <input type="checkbox" ${selectedCities.includes(k)?'checked':''}>
      <span>${v}</span>
    </div>`
  ).join('');
  updateCityAlloc();
}

function toggleCity(city){
  const idx=selectedCities.indexOf(city);
  if(idx>=0) selectedCities.splice(idx,1);
  else selectedCities.push(city);
  initCities();
  rebuildAll();
}

function updateCityAlloc(){
  const alloc=$g('cityDayAlloc');
  const inputs=$g('cityDayInputs');
  const total=days();
  if(selectedCities.length<2){alloc.style.display='none';return}
  alloc.style.display='block';
  $g('cityDayTotal').textContent=`(共${total}天)`;
  let html='';
  selectedCities.forEach((c,i)=>{
    const existing=$g('cd_'+c);
    const val=existing?parseInt(existing.value)||0:Math.floor(total/selectedCities.length);
    html+=`<div class="form-group" style="min-width:120px;">
      <label>${CITY_NAMES[c]}</label>
      <div class="city-day-input">
        <input type="number" id="cd_${c}" value="${val}" min="1" max="20" onchange="onCityDayChange()">
        <span style="font-size:11px;color:#888;">天</span>
      </div>
    </div>`;
  });
  inputs.innerHTML=html;
  validateCityDays();
}

function onCityDayChange(){validateCityDays();rebuildAll()}

function validateCityDays(){
  let sum=0;
  selectedCities.forEach(c=>{sum+=parseInt(($g('cd_'+c)||{value:0}).value)||0});
  const tip=$g('cityDayTip');
  const total=days();
  if(sum===total){tip.style.color='#27ae60';tip.textContent='✅ 天数分配正确';return true}
  else{tip.style.color='#e74c3c';tip.textContent='❌ 当前合计'+sum+'天，应为'+total+'天';return false}
}

function getCityDays(city){return parseInt(($g('cd_'+city)||{value:0}).value)||0}

// ===== 核心：当参数变化时重建 =====
function onParamChange(){
  updateCityAlloc();
  // Don't auto-rebuild on every number input to avoid losing edits; only on confirm
}

function rebuildAll(){
  buildDays();
  renderDays();
  calcPrice();
}

// ===== 构建行程框架 =====
function buildDays(){
  const total=days();
  if(selectedCities.length===0){dayData=[];renderDays();calcPrice();return}
  
  // Simplified logic: just create sequential days
  // First determine the sequence of cities per day
  let seq=[];
  let remaining=total;
  
  if(selectedCities.includes('moscow')&&selectedCities.includes('spb')){
    // Complex route: Moscow -> others -> SPB -> Moscow
    let md=getCityDays('moscow');
    let sd=getCityDays('spb');
    let others=selectedCities.filter(c=>c!=='moscow'&&c!=='spb');
    
    seq.push({city:'moscow',type:'arrival',label:'抵达莫斯科'});
    for(let i=1;i<md-1&&seq.length<total-1;i++)seq.push({city:'moscow',type:'sightseeing',label:'莫斯科游览'});
    
    others.forEach(c=>{
      let cd=getCityDays(c);
      if(seq.length<total-1){
        seq.push({city:c,type:'sightseeing',label:CITY_NAMES[c]+'游览'});
        for(let i=1;i<cd&&seq.length<total-1;i++)seq.push({city:c,type:'sightseeing',label:CITY_NAMES[c]+'游览'});
      }
    });
    
    if(seq.length<total-1){
      seq.push({city:'spb',type:'transfer_in',label:'🚄 高铁赴圣彼得堡'});
      for(let i=1;i<sd-1&&seq.length<total-1;i++)seq.push({city:'spb',type:'sightseeing',label:'圣彼得堡游览'});
    }
    seq.push({city:'spb',type:'departure',label:'送机/送站返程'});
  }
  else if(selectedCities.includes('moscow')&&selectedCities.includes('tula')){
    let md=getCityDays('moscow');
    let td=getCityDays('tula');
    let others=selectedCities.filter(c=>c!=='moscow'&&c!=='tula');
    
    seq.push({city:'moscow',type:'arrival',label:'抵达莫斯科'});
    for(let i=1;i<md-1&&seq.length<total-2;i++)seq.push({city:'moscow',type:'sightseeing',label:'莫斯科游览'});
    
    others.forEach(c=>{
      if(seq.length<total-2){seq.push({city:c,type:'sightseeing',label:CITY_NAMES[c]+'游览'});}
    });
    
    seq.push({city:'tula',type:'sightseeing',label:'图拉游览'});
    seq.push({city:'moscow',type:'departure',label:'送机返程'});
  }
  else {
    // Simple: all days in first city
    const mc=selectedCities[0];
    seq.push({city:mc,type:'arrival',label:'抵达'+CITY_NAMES[mc]});
    for(let i=1;i<total-1;i++)seq.push({city:mc,type:'sightseeing',label:CITY_NAMES[mc]+'游览'});
    seq.push({city:mc,type:'departure',label:'送机返程'});
  }
  
  // Trim/pad to match total
  while(seq.length>total)seq.pop();
  while(seq.length<total)seq.push({city:selectedCities[0]||'moscow',type:'sightseeing',label:'自由活动'});
  
  // Build dayData objects, preserving existing data where possible
  const oldData=dayData;
  dayData=seq.map((item,idx)=>{
    const old=oldData[idx]||{};
    const d=new Date(2026,6,11+idx);
    return {
      day:idx+1,
      date:(d.getMonth()+1)+'/'+d.getDate(),
      weekday:WEEKDAYS[d.getDay()],
      city:item.city,
      type:item.type,
      label:old.label||item.label,
      attractions:old.attractions||[],
      meals:old.meals||{breakfast:true,lunch:true,dinner:false,mealType:'cn'},
      vehicleHours:old.vehicleHours||(item.type==='arrival'||item.type==='departure'?4:item.type==='sightseeing'?10:6),
      parkingFee:old.parkingFee||2500,
      guideCost:old.guideCost||(item.type==='arrival'||item.type==='departure'?PRICE.guideHalf:PRICE.guideFull),
      customCost:old.customCost||0,
      customNote:old.customNote||'',
      _extraHotels:old._extraHotels||0,
    };
  });
}

function escHtml(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function toggleDay(idx){
  const b=$g('db_'+idx);
  if(b)b.classList.toggle('open');
}

function toggleAttr(di,aid,aname,acost){
  const day=dayData[di];
  const ei=day.attractions.findIndex(a=>a.id===aid);
  if(ei>=0)day.attractions.splice(ei,1);
  else day.attractions.push({id:aid,name:aname,cost:acost});
  refreshAttrs(di);
  calcPrice();
}
function removeAttr(di,aid){
  dayData[di].attractions=dayData[di].attractions.filter(a=>a.id!==aid);
  refreshAttrs(di);
  // Uncheck checkbox
  calcPrice();
}
function refreshAttrs(di){
  const c=$g('sa_'+di);
  if(!c)return;
  c.innerHTML=dayData[di].attractions.map(a=>
    `<span class="tag">${a.name} ${a.cost>0?a.cost+'₽':''}<span class="del" onclick="removeAttr(${di},'${a.id}')">✕</span></span>`
  ).join('');
}

// ===== 计算报价 =====
function calcPrice(){
  const ppl=people(),peak=peakMul(),vCost=vehCost(),hCost=hotelCost(),ghCost=guideHotel(),dhCost=driverHotel();
  const p=$g('priceSummary');
  
  if(dayData.length===0){p.innerHTML='<p style="color:#999;text-align:center;padding:16px;">请先配置行程</p>';return}
  
  // Calculate rooms needed: for family double rooms
  let rooms=Math.ceil(ppl/2);
  if(rooms<1)rooms=1;
  
  // Build per-day costs
  let dayCosts=[];
  let totals={vehicle:0,parking:0,guide:0,hotel:0,guideHotel:0,meals:0,tickets:0,driverMeal:0,custom:0};
  
  dayData.forEach((day,idx)=>{
    const mt=day.meals.mealType||'cn';
    const lunchPrice=mt==='cn'?PRICE.meal.lunch_cn:PRICE.meal.lunch_ru;
    const dinnerPrice=mt==='cn'?PRICE.meal.dinner_cn:(mt==='ru'?PRICE.meal.dinner_ru:PRICE.meal.dinner_cn);
    // mixed: lunch ru, dinner cn
    
    let v=day.vehicleHours*vCost*peak;
    let pk=day.parkingFee;
    let g=day.guideCost;
    let ho=(day.type!=='departure')?hCost*rooms:0;
    let gh=(day.type!=='departure')?ghCost+dhCost:0; // guide + driver hotel
    // If user set extra rooms
    if(day._extraHotels>0)gh+=hCost*day._extraHotels;
    
    let ml=(day.meals.lunch?lunchPrice*ppl:0)+(day.meals.dinner?dinnerPrice*ppl:0);
    let dm=(day.meals.lunch?PRICE.driverMeal:0)+(day.meals.dinner?PRICE.driverMeal:0);
    let tk=day.attractions.reduce((s,a)=>s+a.cost*ppl,0);
    let cu=day.customCost;
    
    let total=v+pk+g+ho+gh+ml+dm+tk+cu;
    dayCosts.push({day:day.day,label:day.label,city:CITY_NAMES[day.city]||day.city,
      vehicle:v,parking:pk,guide:g,hotel:ho,guideHotel:gh,meals:ml,driverMeal:dm,tickets:tk,custom:cu,total});
    
    totals.vehicle+=v; totals.parking+=pk; totals.guide+=g; totals.hotel+=ho; totals.guideHotel+=gh;
    totals.meals+=ml; totals.driverMeal+=dm; totals.tickets+=tk; totals.custom+=cu;
  });
  
  // High speed train
  let trainCost=0;
  const hasMoscow=selectedCities.includes('moscow');
  const hasSpb=selectedCities.includes('spb');
  if(hasMoscow&&hasSpb){
    const trips=dayData.some(d=>d.type==='transfer_out')?2:1;
    trainCost=PRICE.highspeed*ppl*trips;
  }
  
  // Transfers
  let transferCost=0;
  dayData.forEach(d=>{if(['arrival','departure','transfer_in','transfer_out'].includes(d.type))transferCost+=PRICE.transfer});
  
  const grandTotal=totals.vehicle+totals.parking+totals.guide+totals.hotel+totals.guideHotel+totals.meals+totals.driverMeal+totals.tickets+totals.custom+trainCost+transferCost;
  const perPerson=Math.round(grandTotal/ppl);
  const perPersonCny=Math.round(perPerson/13);
  const totalCny=Math.round(grandTotal/13);
  
  // Render summary
  let h=`<div style="font-size:12px;color:#888;margin-bottom:8px;">
    ${ppl}人 · ${rooms}间房 · ${HOTEL_NAMES[hotelStar()]} · ${VEHICLE_NAMES[vehicle()]}${isPeak()?' · 🌞旺季+15%':''}
    · 含导游/司机住宿
  </div>
  <table class="qt">
    <thead><tr><th>费用项目</th><th>金额(₽)</th><th>人均(₽)</th><th>人民币</th></tr></thead>
    <tbody>
      <tr><td>🚐 用车(含停车+司机餐)</td><td>${(totals.vehicle+totals.parking+totals.driverMeal).toLocaleString()}</td><td>${Math.round((totals.vehicle+totals.parking+totals.driverMeal)/ppl).toLocaleString()}</td><td>≈${Math.round((totals.vehicle+totals.parking+totals.driverMeal)/13).toLocaleString()}元</td></tr>
      <tr><td>👤 中文导游</td><td>${totals.guide.toLocaleString()}</td><td>${Math.round(totals.guide/ppl).toLocaleString()}</td><td>≈${Math.round(totals.guide/13).toLocaleString()}元</td></tr>

// ===== 生成文档 =====
function genDoc(){
  const ppl=people(),rooms=Math.ceil(ppl/2),hs=hotelStar(),veh=vehicle(),peak=isPeak();
  const totalDays=dayData.length;
  
  if(totalDays===0){toast('请先配置行程');return}
  
  // Recalculate
  let dayCosts=[];
  let totals={vehicle:0,parking:0,guide:0,hotel:0,guideHotel:0,meals:0,tickets:0,driverMeal:0,custom:0};
  
  dayData.forEach((day,idx)=>{
    const mt=day.meals.mealType||'cn';
    const lunchPrice=mt==='cn'?PRICE.meal.lunch_cn:PRICE.meal.lunch_ru;
    const dinnerPrice=mt==='cn'?PRICE.meal.dinner_cn:(mt==='ru'?PRICE.meal.dinner_ru:PRICE.meal.dinner_cn);
    const vCost=PRICE.vehicle[veh]||2500;
    const hCost=PRICE.hotel[hs]||7000;
    const ghCost=PRICE.guideHotel[hs]||7500;
    const dhCost=PRICE.driverHotel[hs]||5500;
    const pm=peak?1.15:1;
    
    let v=day.vehicleHours*vCost*pm;
    let pk=day.parkingFee;
    let g=day.guideCost;
    let ho=(day.type!=='departure')?hCost*rooms:0;
    let gh=(day.type!=='departure')?ghCost+dhCost:0;
    if(day._extraHotels>0)gh+=hCost*day._extraHotels;
    let ml=(day.meals.lunch?lunchPrice*ppl:0)+(day.meals.dinner?dinnerPrice*ppl:0);
    let dm=(day.meals.lunch?PRICE.driverMeal:0)+(day.meals.dinner?PRICE.driverMeal:0);
    let tk=day.attractions.reduce((s,a)=>s+a.cost*ppl,0);
    let cu=day.customCost;
    let total=v+pk+g+ho+gh+ml+dm+tk+cu;
    
    dayCosts.push({day:day.day,idx,label:day.label,city:CITY_NAMES[day.city]||day.city,date:day.date,weekday:day.weekday,
      attractions:day.attractions,meals:day.meals,mealType:mt,
      vehicleHours:day.vehicleHours,type:day.type,customNote:day.customNote,
      vehicle:v,parking:pk,guide:g,hotel:ho,guideHotel:gh,meals:ml,driverMeal:dm,tickets:tk,custom:cu,total});
    
    totals.vehicle+=v;totals.parking+=pk;totals.guide+=g;totals.hotel+=ho;totals.guideHotel+=gh;
    totals.meals+=ml;totals.driverMeal+=dm;totals.tickets+=tk;totals.custom+=cu;
  });
  
  let trainCost=0,transferCost=0;
  const hasMoscow=selectedCities.includes('moscow');
  const hasSpb=selectedCities.includes('spb');
  if(hasMoscow&&hasSpb){
    const trips=dayData.some(d=>d.type==='transfer_out')?2:1;
    trainCost=PRICE.highspeed*ppl*trips;
  }
  dayData.forEach(d=>{if(['arrival','departure','transfer_in','transfer_out'].includes(d.type))transferCost+=PRICE.transfer});
  
  const grandTotal=totals.vehicle+totals.parking+totals.guide+totals.hotel+totals.guideHotel+totals.meals+totals.driverMeal+totals.tickets+totals.custom+trainCost+transferCost;
  const perP=Math.round(grandTotal/ppl);
  const perPCny=Math.round(perP/13);
  const totalCny=Math.round(grandTotal/13);
  
  const pName=$g('f_name').value;

  // Simple formatted table

// ===== 保存/载入 =====
function saveToFile(){
  const state={selectedCities,dayData,f_name:$g('f_name').value,f_client:$g('f_client').value,
    f_people:$g('f_people').value,f_days:$g('f_days').value,f_depart:$g('f_depart').value,
    f_hotel:$g('f_hotel').value,f_vehicle:$g('f_vehicle').value,f_peak:$g('f_peak').value};
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`俄旅方案_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('✅ 方案已保存');
}

function loadFromFile(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='.json';
  input.onchange=async(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    const text=await file.text();
    try{
      const state=JSON.parse(text);
      if(state.selectedCities)selectedCities=state.selectedCities;
      if(state.dayData)dayData=state.dayData;
      if(state.f_name)$g('f_name').value=state.f_name;
      if(state.f_client)$g('f_client').value=state.f_client;
      if(state.f_people)$g('f_people').value=state.f_people;
      if(state.f_days)$g('f_days').value=state.f_days;
      if(state.f_depart)$g('f_depart').value=state.f_depart;
      if(state.f_hotel)$g('f_hotel').value=state.f_hotel;
      if(state.f_vehicle)$g('f_vehicle').value=state.f_vehicle;
      if(state.f_peak)$g('f_peak').value=state.f_peak;
      initCities();
      renderDays();
      calcPrice();
      toast('✅ 方案已载入');
    }catch(e){toast('❌ 文件格式错误');}
  };
  input.click();
}

function resetAll(){
  if(!confirm('确定重置所有数据吗？'))return;
  dayData=[];selectedCities=['moscow','spb'];
  $g('f_name').value='莫斯科+圣彼得堡';
  $g('f_client').value='family';
  $g('f_people').value='5';
  $g('f_days').value='9';
  $g('f_hotel').value='4';
  $g('f_vehicle').value='minibus';
  $g('f_peak').value='0';
  $g('outputBox').classList.remove('open');
  initCities();
  rebuildAll();
  toast('🔄 已重置');
}

function toast(msg){
  const t=$g('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

  if (!v || !v.startsWith('sk-')) { toast('\u8bf7\u8f93\u5165\u6709\u6548\u7684API Key'); return; }
  ak = v;
  localStorage.setItem('adu_ak', ak);
  var st = document.getElementById('akSt');
  if (st) { st.textContent = '\u2705'; st.style.color = '#27ae60'; }
  var sb = document.getElementById('saveKeyBtn');
  if (sb) sb.disabled = true;
  var inp = document.getElementById('akInp');
  if (inp) inp.value = ak.slice(0,6) + '...' + ak.slice(-4);
  toast('\u2705 Key\u5df2\u4fdd\u5b58');
};
function welcomeMsg() {
  var ms = document.getElementById('ctMs');
  if (ms) ms.innerHTML = '<div class="chat-msg chat-a">\u4f60\u597d\uff01\u6211\u662f\u963f\u675cAI\u52a9\u624b \ud83e\udd16<br><br>\u544a\u8bc9\u6211\u4f60\u7684\u65c5\u884c\u9700\u6c42\uff0c\u6211\u4f1a\u81ea\u52a8\u914d\u7f6e\u884c\u7a0b\u548c\u62a5\u4ef7\u3002<br><br><b>\u4f8b\u5982\uff1a</b><br>\u2022 "5\u4eba\u5bb6\u5ead\u56e2\uff0c9\u5929\u83ab\u65af\u79d1+\u5723\u5f7c\u5f97\u5821"<br>\u2022 "10\u4e2a\u4eba\uff0c\u83ab\u65af\u79d1+\u56fe\u62c9\uff0c7\u5929"<br>\u2022 "\u60f3\u770b\u6781\u5149\uff0c4\u4eba\u6469\u5c14\u66fc\u65af\u514b+\u83ab\u65af\u79d1"<br><br>\u76f4\u63a5\u8f93\u5165\u9700\u6c42\u5f00\u59cb\u5427 \udbc0\udcbc</div>';
}
window.sc = function() {
  if (sessionStorage.getItem('adu_admin') !== '1') { toast('\u8bf7\u5148\u767b\u5f55'); return; }
  var inp = document.getElementById('ctInp');
  var t = inp.value.trim();
  if (!t) return;
  if (!ak) { toast('\u8bf7\u5148\u8bbe\u7f6eAPI Key'); return; }
  inp.value = '';
  var ms = document.getElementById('ctMs');
  var d = document.createElement('div');
  d.className = 'chat-msg chat-u';
  d.textContent = t;
  ms.appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
  ch.push({role:'user',content:t});
  document.getElementById('sBtn').disabled = true;
  var td = document.createElement('div');
  td.className = 'ct'; td.id = 'td';
  td.innerHTML = '<span class="d"></span><span class="d"></span><span class="d"></span>';
  ms.appendChild(td);
  td.scrollIntoView({behavior:'smooth'});
  callAI(t);
};
function callAI(userMsg) {
  fetch('https://api.deepseek.com/v1/chat/completions', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+ak},
    body: JSON.stringify({
      model:'deepseek-chat',
      messages:(function(){
        // Build full conversation history: system message + all previous exchanges
        var msgs = [{role:'system',content:'你是一个俄罗斯旅游定制AI助手。你需要通过对话了解用户需求，然后自动配置行程。

可用城市（city key用英文）：
- moscow: 莫斯科
- spb: 圣彼得堡
- tula: 图拉
- sergiev: 谢尔盖耶夫
- suzdal: 苏兹达里+弗拉基米尔

车型：bus(大巴), minibus(中巴), sedan(轿车/商务)
客户类型：family(家庭团), group(常规团), vip(VIP精品团)
住宿：3(三星), 4(四星), 5(五星)

当用户确认需求后，在回复末尾添加[FILL]并跟一个JSON对象，格式如下：
{
  "basic": {
    "name": "产品名称（如：莫斯科+圣彼得堡经典之旅）",
    "people": 人数,
    "days": 天数,
    "depart": "出发城市（如：北京/上海/广州/深圳/成都/香港）",
    "hotel": "3或4或5",
    "vehicle": "bus或minibus或sedan",
    "peak": true或false,
    "client": "family或group或vip"
  },
  "cities": ["moscow","spb","tula"],
  "cityDays": {"moscow":天数, "spb":天数, "tula":天数},
  "attractions": {
    "moscow": [{"id":"red_sq"}, {"id":"kremlin"}],
    "spb": [{"id":"hermitage"}, {"id":"peterhof"}]
  }
}
注意：cityDays的天数之和应等于basic.days总数。
景点id从以下列表选择：
莫斯科：red_sq(红场), st_basil(圣瓦西里), lenin_mau(列宁墓), gum(古姆百货), kremlin(克里姆林宫), armoury(军械库), tretyakov(特列季亚科夫画廊), sparrow(麻雀山), msu(莫大), christ_sav(基督救世主大教堂), vdnh(VDNH), novodevichy(新圣女公墓), tsaritsyno(察里津诺庄园), metro_tour(地铁巡游), victory_temple(武装力量大教堂), tank_museum(坦克博物馆), bunker42(冷战地堡), radisson(游船晚餐), bolshoi(大剧院)
圣彼得堡：hermitage(冬宫), peterhof(夏宫), catherine_palace(叶宫), savior_blood(滴血大教堂), kazan_cathedral(喀山大教堂), st_isaac(圣以撒大教堂), peter_paul(彼得保罗要塞), nevsky(涅瓦大街), russian_museum(俄罗斯博物馆), lakhta(拉赫塔中心), mariinsky(马林斯基剧院)
图拉：tula_kremlin(图拉克里姆林宫), gingerbread(姜饼博物馆), samovar(茶炊博物馆), weapon_museum(武器博物馆), yasnaya(托尔斯泰庄园)
谢尔盖耶夫：trinity_lavra(圣三一修道院)
苏兹达里：suzdal_kremlin(苏兹达里克里姆林宫), wooden_arch(木建筑博物馆), vladimir_cathedral(弗拉基米尔大教堂)

注意：不要解释JSON结构，直接回复用户并添加[FILL]JSON。'}];
        // Append full conversation history
        ch.forEach(function(m){ msgs.push(m); });
        msgs.push({role:'user',content:userMsg});
        return msgs;
      })()
    })
  })
  .then(function(r){return r.json()})
  .then(function(d){
    var td = document.getElementById('td');
    if (td) td.remove();
    document.getElementById('sBtn').disabled = false;
    if (d.error) {
      var ms = document.getElementById('ctMs');
      var de = document.createElement('div');
      de.className = 'chat-msg chat-a';
      de.textContent = '\u274c ' + d.error.message;
      ms.appendChild(de);
      de.scrollIntoView({behavior:'smooth'});
      return;
    }
    var reply = d.choices[0].message.content;
    var ms = document.getElementById('ctMs');
    var rdiv = document.createElement('div');
    rdiv.className = 'chat-msg chat-a';
    rdiv.innerHTML = reply.replace(/\n/g,'<br>');
    ms.appendChild(rdiv);
    rdiv.scrollIntoView({behavior:'smooth'});
    ch.push({role:'assistant',content:reply});
    
    // Check for fill command
    if (reply.indexOf('[FILL]') >= 0) {
      var parts = reply.split('[FILL]');
      if (parts[1]) {
        try {
          var config = JSON.parse(parts[1].trim());
          if (config.basic) {
            var nm = document.getElementById('f_name');
            if (nm && config.basic.name) nm.value = config.basic.name;
            var dp = document.getElementById('f_depart');
            if (dp && config.basic.depart) { try{ dp.value = config.basic.depart; }catch(e){} }
            var ppl = document.getElementById('f_people');
            if (ppl && config.basic.people) ppl.value = config.basic.people;
            var dys = document.getElementById('f_days');
            if (dys && config.basic.days) dys.value = config.basic.days;
            var htl = document.getElementById('f_hotel');
            if (htl && config.basic.hotel) htl.value = String(config.basic.hotel);
            var veh = document.getElementById('f_vehicle');
            if (veh && config.basic.vehicle) { try{ veh.value = config.basic.vehicle; }catch(e){} }
            var pk = document.getElementById('f_peak');
            if (pk && config.basic.peak !== undefined) pk.value = config.basic.peak ? '1' : '0';
            var cl = document.getElementById('f_client');
            if (cl && config.basic.client) { try{ cl.value = config.basic.client; }catch(e){} }
          }
          // Handle cities - clear existing first, then add
          if (config.cities && config.cities.length) {
            // Reset city selection
            selectedCities = [];
            config.cities.forEach(function(city) {
              if (Object.keys(CITY_NAMES).includes(city)) {
                selectedCities.push(city);
              }
            });
            // Update city chip UI
            document.querySelectorAll('.city-chip').forEach(function(chip) {
              var city = chip.dataset.city;
              if (selectedCities.includes(city)) {
                chip.classList.add('selected');
                chip.querySelector('input').checked = true;
              } else {
                chip.classList.remove('selected');
                chip.querySelector('input').checked = false;
              }
            });
            // Update city day allocation
            window.updateCityAlloc();
          }
          // Handle city day distribution
          if (config.cityDays) {
            Object.keys(config.cityDays).forEach(function(city) {
              var inp = document.getElementById('cd_' + city);
              if (inp) inp.value = config.cityDays[city];
            });
          }
          // Trigger rebuild to create day structure
          if (window.onParamChange) window.onParamChange();
          window.rebuildAll();
          // Handle attractions - add to each day after dayData is built
          if (config.attractions) {
            Object.keys(config.attractions).forEach(function(city) {
              var attrs = config.attractions[city];
              if (attrs && attrs.length) {
                dayData.forEach(function(day) {
                  if (day.city === city) {
                    attrs.forEach(function(attr) {
                      var ainfo = null;
                      var cityAttrs = ATTR[city] || [];
                      for (var i = 0; i < cityAttrs.length; i++) {
                        if (cityAttrs[i].id === attr.id) {
                          ainfo = cityAttrs[i];
                          break;
                        }
                      }
                      if (ainfo && !day.attractions.some(function(x) { return x.id === ainfo.id; })) {
                        day.attractions.push({id: ainfo.id, name: ainfo.name, cost: ainfo.cost});
                      }
                    });
                  }
                });
              }
            });
            renderDays();
            calcPrice();
          }
          // Update city day allocation display
          var alloc = document.getElementById('cityDayAlloc');
          if (alloc) { alloc.style.display = 'block'; updateCityAlloc(); }
          // Scroll to day editor
          var de = document.getElementById('dayEditor');
          if (de) de.scrollIntoView({behavior:'smooth', block:'start'});
          toast('\u2705 AI\u5df2\u81ea\u52a8\u914d\u7f6e\u884c\u7a0b\uff01\n\u8bf7\u68c0\u67e5\u5e76\u8c03\u6574\u6bcf\u5929\u660e\u7ec6');
        } catch(e) {
          toast('\u274c \u89e3\u6790\u5931\u8d25');
        }
      }
    }
  })
  .catch(function(e){
    var td = document.getElementById('td');
    if (td) td.remove();
    document.getElementById('sBtn').disabled = false;
    toast('\u274c ' + e.message);
  });
}
// Init
if (sessionStorage.getItem('adu_admin') === '1') {
  var ind = document.getElementById('adminIndicator');
  if (ind) { ind.innerHTML = '\ud83d\udd13 \u5df2\u767b\u5f55'; ind.style.color = 'rgba(255,255,255,.9)'; }
  var ls = document.getElementById('loginStatus');
  if (ls) { ls.textContent = '\u2705 \u5df2\u767b\u5f55'; ls.style.color = '#27ae60'; }
  var lo = document.getElementById('logoutBtn');
  if (lo) lo.style.display = '';
  var akr = document.getElementById('apiKeyRow');
  if (akr) akr.style.display = 'flex';
}
if (ak && ak !== '') {
  var st = document.getElementById('akSt');
  if (st) { st.textContent = '\u2705'; st.style.color = '#27ae60'; }
  if (sessionStorage.getItem('adu_admin') === '1') {
    var sb = document.getElementById('sBtn');
    if (sb) sb.disabled = false;
  }
}
if (sessionStorage.getItem('adu_admin') === '1') {
  welcomeMsg();
} else {
  var ms = document.getElementById('ctMs');
  if (ms) ms.innerHTML = '<div class="chat-msg chat-a" style="text-align:center;padding:30px"><div style="font-size:40px">\ud83d\udd10</div><div style="margin-top:10px;font-weight:600">\u8bf7\u767b\u5f55\u7ba1\u7406\u5458\u8d26\u53f7</div><div style="font-size:12px;color:#888;margin-top:6px">\u767b\u5f55\u540e\u53ef\u542f\u7528AI\u52a9\u624b</div></div>';
}
})();
