<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿杜俄旅 · 行程成本核算系统</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#12100E;--bg2:#1A1816;--bg3:#242220;--card:#1E1C1A;--card2:#2A2825;--gold:#C4A862;--gold2:#8A7640;--gold-light:rgba(196,168,98,0.12);--red:#CC0000;--red2:#8B0000;--cream:#E8DEC8;--text:#D4CCC3;--text2:#9A9488;--text3:#6A6458;--border:#34302C;--border2:#2A2825;--success:#10B981;--warn:#F59E0B;--font-display:'Cormorant Garamond',Georgia,serif;--font-body:'Inter','PingFang SC','Microsoft YaHei',sans-serif;--radius:8px;--radius-sm:5px}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.top-bar{height:3px;background:linear-gradient(90deg,var(--red),var(--gold),var(--red))}
.top-strip{background:var(--bg2);padding:4px 20px;display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--text3);border-bottom:1px solid var(--border)}
.top-strip button{background:transparent;border:1px solid var(--border);color:var(--text2);padding:3px 10px;border-radius:3px;font-size:9px;cursor:pointer;font-family:inherit;transition:all 0.2s}
.top-strip button:hover{border-color:var(--gold);color:var(--gold)}
.top-strip .badge{color:var(--gold);font-size:9px;display:none;margin-right:8px}
nav{display:flex;justify-content:space-between;align-items:center;padding:0 20px;height:48px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--cream)}
.nav-logo .seal{width:26px;height:26px;border:2px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--gold)}
.nav-logo span{font-weight:400;color:var(--text2);font-size:10px;font-family:var(--font-body)}
nav .nav-actions{display:flex;gap:4px;align-items:center}
nav .nav-actions button{padding:4px 12px;font-size:10px;border-radius:3px;cursor:pointer;font-family:inherit;font-weight:500;transition:all 0.15s}
.btn-gold{background:var(--gold);color:var(--bg);border:none}.btn-gold:hover{background:var(--cream)}
.btn-dark{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}.btn-dark:hover{border-color:var(--gold)}
.btn-red{background:var(--red);color:#fff;border:none}.btn-red:hover{background:var(--red2)}

.modal-overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.85);justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);padding:28px;max-width:750px;width:90%;max-height:85vh;overflow-y:auto}
.modal h3{font-family:var(--font-display);font-size:17px;color:var(--gold);margin-bottom:4px;text-align:center}
.modal .field{margin-bottom:10px}
.modal .field label{font-size:10px;color:var(--text2);display:block;margin-bottom:3px;font-weight:500}
.modal .field input,.modal .field select,.modal .field textarea{width:100%;padding:7px 10px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:11px;font-family:inherit;border-radius:3px;outline:none}
.modal .field input:focus,.modal .field select:focus,.modal .field textarea:focus{border-color:var(--gold)}
.modal .field textarea{min-height:50px;resize:vertical}
.modal .btn-row{display:flex;gap:8px;margin-top:14px;justify-content:center}
.modal .btn-row button{padding:7px 20px;border:none;border-radius:3px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}

.app{display:flex;height:calc(100vh - 76px)}
/* Sidebar */
.sidebar{width:275px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
.sb-section{padding:10px 12px;border-bottom:1px solid var(--border)}
.sb-section h4{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.sb-section .group-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:3px;font-size:11px;font-family:inherit;outline:none;margin-bottom:6px}
.sb-section .group-input:focus{border-color:var(--gold)}
.sb-section .group-input::placeholder{color:var(--text3)}
.sb-section .sb-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-size:10px;color:var(--text2)}
.sb-section .sb-row select,.sb-section .sb-row input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:3px 6px;border-radius:3px;font-size:10px;font-family:inherit;outline:none;width:100px}
.sb-section .sb-row select:focus,.sb-section .sb-row input:focus{border-color:var(--gold)}
.sb-section .margin-row{display:flex;align-items:center;gap:6px}.sb-section .margin-row input[type=range]{flex:1}.sb-section .margin-row span{font-weight:600;color:var(--gold);min-width:32px;font-size:10px}
.sidebar .city-card{display:flex;align-items:center;gap:5px;padding:5px 7px;border-radius:3px;cursor:pointer;font-size:10px;color:var(--text2);margin-bottom:2px;border:1px solid transparent;transition:all 0.1s}
.sidebar .city-card:hover{background:var(--bg3);color:var(--cream)}
.sidebar .city-card.sel{background:var(--gold-light);border-color:rgba(196,168,98,0.25);color:var(--gold)}
.sidebar .city-card .drag{cursor:grab;color:var(--text3);font-size:8px;margin-right:2px}
.sidebar .city-card .ct-name{flex:1}.sidebar .city-card .ct-days input{width:22px;background:var(--bg);border:1px solid var(--border);color:var(--text);text-align:center;padding:1px;border-radius:2px;font-size:9px;font-family:inherit;outline:none}.sidebar .city-card .ct-days input:focus{border-color:var(--gold)}
.sidebar .city-card .ct-del{font-size:7px;color:var(--text3);cursor:pointer;padding:1px 3px;opacity:0;transition:opacity 0.1s}.sidebar .city-card:hover .ct-del{opacity:1}.sidebar .city-card .ct-del:hover{color:var(--red)}
.sidebar .add-city{display:flex;align-items:center;gap:5px;padding:5px 7px;color:var(--text3);font-size:9px;cursor:pointer;border:1px dashed var(--border);border-radius:3px;justify-content:center;margin-top:4px}.sidebar .add-city:hover{border-color:var(--gold);color:var(--gold)}
.sidebar .city-pool{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}.sidebar .city-pool .chip{font-size:8px;padding:2px 7px;border-radius:7px;border:1px solid var(--border);color:var(--text3);cursor:pointer;transition:all 0.1s}.sidebar .city-pool .chip:hover{border-color:var(--gold);color:var(--gold)}
.total-days{text-align:center;font-size:10px;color:var(--text3);padding:6px}
.total-days b{color:var(--gold);font-size:14px;font-family:var(--font-display)}

/* Main - Accordion */
.main-content{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:6px}
.main-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:10px;color:var(--text3)}
.main-toolbar button{padding:3px 10px;font-size:9px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:3px;cursor:pointer;font-family:inherit}.main-toolbar button:hover{border-color:var(--gold);color:var(--gold)}
.main-empty{text-align:center;padding:40px 20px;color:var(--text3);margin-top:40px}.main-empty .big{font-size:40px;margin-bottom:8px}

/* Day Card - Accordion */
.day-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius)}
.day-card+.day-card{margin-top:4px}
.day-card .dc-header{display:flex;align-items:center;padding:10px 14px;cursor:pointer;gap:8px;user-select:none;transition:all 0.15s}
.day-card .dc-header:hover{background:var(--bg3)}
.day-card .dc-header .dc-arrow{font-size:10px;color:var(--text3);transition:transform 0.2s;min-width:14px;text-align:center}
.day-card.open .dc-header .dc-arrow{transform:rotate(90deg)}
.day-card .dc-header .dc-num{font-family:var(--font-display);font-size:15px;font-weight:700;color:var(--gold);min-width:32px}
.day-card .dc-header .dc-city{font-size:9px;background:var(--gold-light);color:var(--gold);padding:1px 8px;border-radius:8px;white-space:nowrap}
.day-card .dc-header .dc-title{flex:1;font-size:12px;font-weight:500;color:var(--text)}
.day-card .dc-header .dc-costs{display:flex;gap:8px;font-size:9px;color:var(--text3);align-items:center}
.day-card .dc-header .dc-costs span{color:var(--gold);font-weight:500}
.day-card .dc-header .dc-actions{display:flex;gap:2px}
.day-card .dc-header .dc-actions button{background:none;border:none;color:var(--text3);font-size:9px;cursor:pointer;padding:2px 5px;border-radius:2px}.day-card .dc-header .dc-actions button:hover{background:var(--bg);color:var(--cream)}
.day-card .dc-body{display:none;padding:0 14px 12px 14px}
.day-card.open .dc-body{display:block}

/* Day body sections */
.day-card .dc-body .dc-section{margin-top:10px}
.day-card .dc-body .dc-section h5{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid var(--border)}
.day-item{display:grid;grid-template-columns:42px 1fr auto 22px;gap:6px;padding:4px 6px;border-radius:3px;align-items:center;transition:all 0.1s;font-size:10px}
.day-item:hover{background:var(--bg3)}
.day-item .di-time input{width:100%;background:transparent;border:none;color:var(--text3);font-size:9px;font-family:inherit;outline:none;padding:1px}.day-item .di-time input:focus{color:var(--cream)}
.day-item .di-desc{display:flex;align-items:center;gap:5px}
.day-item .di-desc span{font-size:11px;min-width:14px;text-align:center}
.day-item .di-desc input{flex:1;background:transparent;border:none;color:var(--text);font-size:10px;font-family:inherit;outline:none;padding:1px}.day-item .di-desc input:focus{background:var(--bg);border-radius:2px}.day-item .di-desc input::placeholder{color:var(--text3)}
.day-item .di-type{font-size:8px;color:var(--text3);padding:1px 5px;border-radius:6px;background:var(--bg)}
.day-item .di-del{font-size:8px;color:var(--text3);cursor:pointer;text-align:center;padding:2px;opacity:0;transition:opacity 0.1s}.day-item:hover .di-del{opacity:1}.day-item .di-del:hover{color:var(--red)}
.day-add-row{display:flex;gap:4px;margin-top:4px}
.day-add-row select{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:9px;padding:4px 6px;border-radius:3px;font-family:inherit;outline:none}.day-add-row select:focus{border-color:var(--gold)}
.day-add-row button{background:var(--gold);color:var(--bg);border:none;padding:4px 10px;font-size:9px;font-weight:600;cursor:pointer;border-radius:3px;font-family:inherit;white-space:nowrap}.day-add-row button:hover{background:var(--cream)}
.day-add-custom{display:flex;gap:4px;margin-top:3px}.day-add-custom input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:9px;padding:4px 6px;border-radius:3px;font-family:inherit;outline:none}.day-add-custom input::placeholder{color:var(--text3)}.day-add-custom input:focus{border-color:var(--gold)}
.day-add-custom button{background:transparent;color:var(--text2);border:1px solid var(--border);padding:4px 8px;font-size:9px;cursor:pointer;border-radius:3px;font-family:inherit;white-space:nowrap}.day-add-custom button:hover{border-color:var(--gold);color:var(--gold)}

/* Cost toggles in day card */
.cost-toggles{display:flex;flex-wrap:wrap;gap:4px}
.cost-toggles label{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--text2);cursor:pointer;padding:3px 8px;border:1px solid var(--border);border-radius:8px;transition:all 0.1s}
.cost-toggles label:hover{border-color:var(--gold);color:var(--cream)}
.cost-toggles label input{display:none}
.cost-toggles label.checked{background:var(--gold-light);border-color:rgba(196,168,98,0.35);color:var(--gold)}
.cost-toggles label .cost-input{width:40px;background:var(--bg);border:1px solid var(--border);color:var(--text);text-align:right;padding:1px 3px;border-radius:2px;font-size:9px;font-family:inherit;outline:none;margin-left:2px}.cost-toggles label .cost-input:focus{border-color:var(--gold)}

/* Quote panel */
.quote-panel{width:280px;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:12px;display:flex;flex-direction:column;gap:8px}
.quote-panel h4{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.q-summary{background:var(--bg3);border-radius:var(--radius-sm);padding:10px;border:1px solid var(--border)}
.q-summary .ql{font-size:9px;color:var(--text3)}.q-summary .qc{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--gold)}.q-summary .qr{font-size:9px;color:var(--text3)}
.q-summary .qp{font-size:12px;font-weight:600;color:var(--cream)}.q-summary .qp .v{color:var(--gold);font-size:15px}
.q-items{display:flex;flex-direction:column;gap:2px;font-size:9px}
.q-items .qi{display:flex;justify-content:space-between;color:var(--text2);padding:1px 0;border-bottom:1px solid var(--border2)}.q-items .qi .qa{color:var(--cream);font-weight:500}
.quote-panel button{width:100%;padding:7px;border:none;border-radius:3px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s}
.quote-panel .btn-gen{background:var(--gold);color:var(--bg)}.quote-panel .btn-gen:hover{background:var(--cream)}
.quote-panel .btn-save{background:var(--bg3);color:var(--cream);border:1px solid var(--border)}.quote-panel .btn-save:hover{border-color:var(--gold)}

.admin-tabs{display:flex;gap:3px;margin-bottom:10px}.admin-tabs button{padding:4px 10px;font-size:9px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;border-radius:3px;font-family:inherit}.admin-tabs button.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.admin-section{display:none}.admin-section.show{display:block}
.atb{width:100%;border-collapse:collapse;font-size:9px}.atb td,.atb th{padding:4px 6px;border:1px solid var(--border)}.atb th{background:var(--bg3);color:var(--text2);font-weight:600;font-size:8px;text-transform:uppercase}
.atb td input{width:100%;background:var(--bg);border:1px solid transparent;color:var(--text);padding:2px 4px;font-size:9px;font-family:inherit;border-radius:2px;outline:none}.atb td input:focus{border-color:var(--gold)}
.atb td button{background:none;border:none;color:var(--text3);font-size:9px;cursor:pointer;padding:1px 4px}.atb td button:hover{color:var(--red)}
.ar-btn{color:var(--text3);font-size:9px;cursor:pointer;padding:3px 6px;border:1px dashed var(--border);border-radius:3px;display:inline-block;margin-top:5px}.ar-btn:hover{border-color:var(--gold);color:var(--gold)}

.output-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.9);justify-content:center;align-items:center;padding:20px}
.output-overlay.show{display:flex}
.o-modal{background:var(--card);border:1px solid var(--border);max-width:800px;width:100%;max-height:90vh;overflow-y:auto;padding:28px;position:relative}
.o-modal .o-close{position:absolute;top:8px;right:12px;font-size:16px;color:var(--text3);cursor:pointer;background:none;border:none}.o-modal .o-close:hover{color:var(--cream)}
.o-content h1{font-family:var(--font-display);font-size:20px;color:var(--gold);margin-bottom:4px}
.o-content .meta{font-size:9px;color:var(--text3);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.o-content table{width:100%;border-collapse:collapse;margin:10px 0;font-size:10px}
.o-content td,.o-content th{padding:5px 7px;border:1px solid var(--border)}.o-content th{background:var(--bg2);color:var(--gold);font-weight:600;font-size:9px}
.o-content h2{font-family:var(--font-display);font-size:14px;color:var(--cream);margin:12px 0 5px}
.o-content .day-blk{margin:5px 0;padding:8px 10px;background:var(--bg2);border-left:3px solid var(--gold);border-radius:0 4px 4px 0}
.o-content .day-blk h4{font-size:11px;color:var(--gold)}.o-content .day-blk p{font-size:9px;color:var(--text2);margin:1px 0}
.o-content .gt{font-family:var(--font-display);font-size:20px;color:var(--gold);text-align:right;padding-top:8px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--cream);padding:8px 20px;border-radius:5px;font-size:11px;z-index:9999;border:1px solid var(--border);opacity:0;transition:opacity 0.3s}.toast.show{opacity:1}
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="top-strip">
<span>🇷🇺 阿杜俄旅 · 内部成本核算系统 v0.02</span>
<span style="display:flex;align-items:center;gap:8px"><span class="badge" id="adminBadge">👑 管理员</span>
<button onclick="showLogin()" id="loginBtn">🔐 登录</button>
<button onclick="toggleTheme()">🌓</button>
<button onclick="exportPlan()">📤 导出</button>
<button onclick="document.getElementById('importFile').click()">📥 导入</button>
<input type="file" id="importFile" style="display:none" onchange="importPlan(event)" accept=".json">
</span></div>

<nav>
<div class="nav-logo"><div class="seal">А</div>阿杜俄旅 <span>· 核算系统</span></div>
<div class="nav-actions">
<button class="btn-dark" onclick="switchTab('admin')" id="adminBtn" style="display:none">⚙️ 管理</button>
<button class="btn-gold" onclick="generateOutput()">📄 生成行程+报价</button>
</div></nav>

<div class="modal-overlay" id="loginModal"><div class="modal"><h3>🔐 登录</h3>
<div class="field"><label>账号</label><input id="loginUser" placeholder="账号"></div>
<div class="field"><label>密码</label><input type="password" id="loginPass" placeholder="密码" onkeydown="if(event.key==='Enter')doLogin()"></div>
<div class="btn-row"><button class="btn-dark" onclick="closeModal('loginModal')">取消</button><button class="btn-gold" onclick="doLogin()">登录</button></div>
<div style="font-size:9px;color:var(--red);text-align:center;margin-top:5px;display:none" id="loginErr">账号或密码错误</div></div></div>

<div class="modal-overlay" id="adminModal"><div class="modal"><h3>⚙️ 管理后台</h3>
<div class="admin-tabs"><button class="active" onclick="showAdmin('rates')">费率库</button><button onclick="showAdmin('attrs')">景点库</button><button onclick="showAdmin('users')">用户管理</button></div>
<div class="admin-section show" id="secRates"><table class="atb" id="ratesTable"></table><div class="ar-btn" onclick="addRate()">+ 新增费率</div></div>
<div class="admin-section" id="secAttrs"><table class="atb" id="attrTable"></table><div class="ar-btn" onclick="addAttraction()">+ 新增景点</div></div>
<div class="admin-section" id="secUsers"><table class="atb" id="usersTable"></table><div class="ar-btn" onclick="addUserDb()">+ 新增用户</div></div>
<div class="btn-row"><button class="btn-dark" onclick="closeModal('adminModal')">关闭</button><button class="btn-gold" onclick="saveAdmin()">💾 保存</button></div></div></div>

<div class="app">
<div class="sidebar">
<div class="sb-section"><h4>📋 团型信息</h4>
<input class="group-input" id="groupName" placeholder="方案名称（如：5人家庭团9天）" onchange="state.name=this.value;saveAll()">
<div class="sb-row"><span>团类型</span><select id="groupType" onchange="state.groupType=this.value;saveAll()"><option value="family">家庭团</option><option value="business">商务团</option><option value="group">散拼团</option><option value="custom">定制团</option></select></div>
<div class="sb-row"><span>酒店星级</span><select id="hotelStar" onchange="state.hotelStar=this.value;recalc()"><option value="3">三星</option><option value="4" selected>四星</option><option value="5">五星</option></select></div>
<div class="sb-row"><span>团人数</span><input type="number" id="paxNum" value="5" min="1" onchange="state.pax=parseInt(this.value)||1;recalc()"></div>
<div class="sb-row"><span>房间数</span><input type="number" id="roomNum" value="3" min="1" onchange="state.rooms=parseInt(this.value)||1;recalc()"></div>
<div class="sb-row"><span>用车类型</span><select id="busType" onchange="state.busType=this.value;recalc()"><option value="minibus">中巴18座</option><option value="bus">大巴35座</option></select></div>
<div class="margin-row"><span>毛利率</span><input type="range" id="marginPct" min="0" max="50" value="15" oninput="recalc()"><span id="marginVal">15%</span></div>
</div>
<div class="sb-section"><h4>📍 目的地</h4><div id="cityList"></div><div class="add-city" onclick="showCityPool()">+ 添加城市</div><div class="city-pool" id="cityPool" style="display:none"></div></div>

// ===== DATABASE =====

spb:[{id:"spb01",name:"冬宫博物馆",type:"sight",cost:800,needRu:!0,ruCost:11800},{id:"spb02",name:"滴血大教堂",type:"sight",cost:450},{id:"spb03",name:"喀山大教堂",type:"sight",cost:0},{id:"spb04",name:"圣以撒大教堂",type:"sight",cost:450},{id:"spb05",name:"夏宫（彼得霍夫）",type:"sight",cost:1200,needRu:!0,ruCost:11800},{id:"spb06",name:"叶卡捷琳娜宫（皇村）",type:"sight",cost:1500,needRu:!0,ruCost:11800},{id:"spb07",name:"彼得保罗要塞",type:"sight",cost:600},{id:"spb08",name:"马林斯基剧院",type:"sight",cost:5000},{id:"spb09",name:"俄罗斯博物馆",type:"sight",cost:800,needRu:!0,ruCost:11800},{id:"spb10",name:"涅瓦大街",type:"free",cost:0}],
tula:[{id:"tula01",name:"托尔斯泰庄园",type:"sight",cost:950},{id:"tula02",name:"图拉克里姆林宫",type:"sight",cost:300},{id:"tula03",name:"姜饼博物馆",type:"sight",cost:500},{id:"tula04",name:"茶炊博物馆",type:"sight",cost:400},{id:"tula05",name:"武器博物馆",type:"sight",cost:600}],
serg:[{id:"serg01",name:"圣三一修道院",type:"sight",cost:700}],suzd:[{id:"suzd01",name:"苏兹达尔克里姆林宫",type:"sight",cost:500},{id:"suzd02",name:"木结构建筑博物馆",type:"sight",cost:400}],
kazan:[{id:"kazan01",name:"喀山克里姆林宫",type:"sight",cost:0},{id:"kazan02",name:"库尔·沙里夫清真寺",type:"sight",cost:0}],irk:[{id:"irk01",name:"贝加尔湖利斯特维扬卡",type:"sight",cost:0},{id:"irk02",name:"贝加尔湖博物馆",type:"sight",cost:400}],
sochi:[{id:"sochi01",name:"奥林匹克公园",type:"sight",cost:0},{id:"sochi02",name:"红波利亚纳",type:"sight",cost:0}],vlad:[{id:"vlad01",name:"金角湾",type:"sight",cost:0}],
novg:[{id:"novg01",name:"诺夫哥罗德克里姆林宫",type:"sight",cost:600}],pskov:[{id:"pskov01",name:"普斯科夫克里姆林宫",type:"sight",cost:500}],kalin:[{id:"kalin01",name:"柯尼斯堡大教堂",type:"sight",cost:400}],
murm:[{id:"murm01",name:"列宁号核动力破冰船",type:"sight",cost:500}],nizh:[{id:"nizh01",name:"下诺夫哥罗德克里姆林宫",type:"sight",cost:400}],yaro:[{id:"yaro01",name:"先知伊利亚教堂",type:"sight",cost:300}]},
rates:{bus_hour:3510,minibus_hour:2500,season_pct:0.15,guide_cn_day:25000,guide_cn_half:15000,hotel_3:2500,hotel_4:3500,hotel_5:6000,meal_lunch:1500,meal_dinner:2000,train_spb:6000,train_other:4000,parking:2500,registration:350,highway:1500,driver_meal:800,driver_overnight:3000},
users:{"3056898":{pass:"pan3056898",role:"admin",name:"管理员"},"staff01":{pass:"adu123",role:"staff",name:"员工老王"}},margin:15};

// ===== STATE =====
let db=JSON.parse(JSON.stringify(DEFAULT_DB));
let currentUser=null;
const defaultState=()=>({id:Date.now(),name:"新建方案",groupType:"family",hotelStar:"4",cities:[],cityDays:{},dayOrder:[],days:{},pax:5,rooms:3,busType:"minibus",margin:15});
let state=defaultState();

function loadFromLS(){
const sdb=localStorage.getItem('adu_db');if(sdb){try{const d=JSON.parse(sdb);db={...DEFAULT_DB,...d,users:{...DEFAULT_DB.users,...(d.users||{})},rates:{...DEFAULT_DB.rates,...(d.rates||{})},attractions:{...DEFAULT_DB.attractions,...(d.attractions||{})}}}catch(e){}}
const ss=localStorage.getItem('adu_state');if(ss){try{state={...defaultState(),...JSON.parse(ss)}}catch(e){}}
if(!state.cities.length){state.cities=['msk','spb'];state.cityDays={msk:4,spb:3};rebuildDays()}
}
try{loadFromLS()}catch(e){console.error('Load failed, resetting',e);localStorage.removeItem('adu_state');localStorage.removeItem('adu_db');state=defaultState();loadFromLS()}

function saveAll(){localStorage.setItem('adu_db',JSON.stringify(db));localStorage.setItem('adu_state',JSON.stringify(state))}
function $_(id){return document.getElementById(id)}
function toast(m){const t=$_('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function openM(id){$_(id).classList.add('show')}
function closeM(id){$_(id).classList.remove('show')}
['loginModal','adminModal','outputOverlay'].forEach(id=>{$_(id).addEventListener('click',e=>{if(e.target===$_(id))closeM(id)})});

// ===== LOGIN =====
function showLogin(){openM('loginModal');$_('loginErr').style.display='none'}
function doLogin(){
const u=$_('loginUser').value.trim(),p=$_('loginPass').value.trim();
if(db.users[u]&&db.users[u].pass===p){currentUser={id:u,...db.users[u]};closeM('loginModal');$_('loginBtn').style.display='none';$_('adminBadge').style.display='inline';$_('adminBadge').textContent=currentUser.role==='admin'?'👑 管理员':'👤 '+currentUser.name;if(currentUser.role==='admin')$_('adminBtn').style.display='inline';toast('✅ 登录成功')}
else{$_('loginErr').style.display='block'}
}
function switchTab(t){
if(t==='admin'){if(!currentUser||currentUser.role!=='admin')return toast('请先以管理员登录');openM('adminModal');renderRates();}
}

// ===== ADMIN =====
function renderRates(){const t=$_('ratesTable');let h='<tr><th>费率项</th><th>单价(₽)</th><th>说明</th><th>操作</th></tr>';const d={bus_hour:'大巴/小时',minibus_hour:'中巴/小时',season_pct:'旺季加成%',guide_cn_day:'中文导游/天',guide_cn_half:'中文导游/半天',hotel_3:'三星酒店/间晚',hotel_4:'四星酒店/间晚',hotel_5:'五星酒店/间晚',meal_lunch:'午餐/人',meal_dinner:'晚餐/人',train_spb:'高铁莫-彼/人',train_other:'高铁其他/人',parking:'停车/天',registration:'注册费/人',highway:'高速费/天',driver_meal:'司机餐费/天',driver_overnight:'司机过夜费/次'};
Object.entries(db.rates).forEach(([k,v])=>{h+=`<tr><td>${k}</td><td><input value="${v}" onchange="db.rates['${k}']=parseFloat(this.value)||0"></td><td>${d[k]||''}</td><td><button onclick="deleteRate('${k}')">🗑</button></td></tr>`});t.innerHTML=h}
function deleteRate(k){delete db.rates[k];renderRates()}
function addRate(){const k=prompt('费率项ID（英文）:');if(!k)return;db.rates[k]=parseFloat(prompt('单价:'))||0;renderRates()}
function renderAttrs(){const t=$_('attrTable');let h='<tr><th>城市</th><th>景点名</th><th>类型</th><th>门票(₽)</th><th>操作</th></tr>';Object.entries(db.attractions).forEach(([ck,attrs])=>{attrs.forEach((a,i)=>{h+=`<tr><td>${db.cities[ck]?.name||ck}</td><td>${a.name}</td><td>${a.type}</td><td><input value="${a.cost}" style="width:50px" onchange="db.attractions['${ck}'][${i}].cost=parseFloat(this.value)||0"></td><td><button onclick="deleteAttr('${ck}',${i})">🗑</button></td></tr>`})});t.innerHTML=h}
function deleteAttr(ck,i){db.attractions[ck].splice(i,1);renderAttrs()}
function addAttraction(){const ck=prompt('城市ID:');if(!ck||!db.cities[ck])return toast('城市不存在');if(!db.attractions[ck])db.attractions[ck]=[];db.attractions[ck].push({id:ck+'c'+Date.now(),name:prompt('景点名:')||'新景点',type:'sight',cost:parseFloat(prompt('门票(₽):'))||0});renderAttrs()}
function renderUsers(){const t=$_('usersTable');if(currentUser?.role!=='admin')return;let h='<tr><th>账号</th><th>角色</th><th>姓名</th><th>操作</th></tr>';Object.entries(db.users).forEach(([k,v])=>{h+=`<tr><td>${k}</td><td>${v.role==='admin'?'管理员':'员工'}</td><td>${v.name}</td><td>${v.role!=='admin'?`<button onclick="deleteUser('${k}')">🗑</button>`:''}</td></tr>`});t.innerHTML=h}
function deleteUser(k){delete db.users[k];renderUsers()}
function addUserDb(){const u=prompt('账号:');if(!u||db.users[u])return toast('已存在');db.users[u]={pass:prompt('密码:')||'123456',role:prompt('角色(admin/staff):')||'staff',name:prompt('姓名:')||u};renderUsers()}
function saveAdmin(){saveAll();closeM('adminModal');init();toast('✅ 已保存')}
function showAdmin(s){document.querySelectorAll('.admin-section').forEach(e=>e.classList.remove('show'));document.querySelectorAll('.admin-tabs button').forEach(b=>b.classList.remove('active'));$_(`sec${s.charAt(0).toUpperCase()+s.slice(1)}`).classList.add('show');event.target.classList.add('active');if(s==='rates')renderRates();if(s==='attrs')renderAttrs();if(s==='users')renderUsers()}

// ===== CITIES =====
function renderCities(){
const el=$_('cityList');el.innerHTML=state.cities.map((c,i)=>`<div class="city-card sel" data-ci="${c}"><span class="drag">⠿</span><span class="ct-name">${db.cities[c]?.emoji||''} ${db.cities[c]?.name||c}</span><span class="ct-days"><input type="number" value="${state.cityDays[c]||3}" min="1" max="20" onchange="updateCityDays('${c}',this.value)">天</span><span class="ct-del" onclick="removeCity('${c}')">✕</span></div>`).join('');
$_('totalDaysNum').textContent=state.dayOrder.length;
}
function showCityPool(){const used=new Set(state.cities);const el=$_('cityPool');el.style.display=el.style.display==='none'?'flex':'none';el.innerHTML=Object.entries(db.cities).filter(([k])=>!used.has(k)).map(([k,v])=>`<span class="chip" onclick="addCity('${k}')">${v.emoji} ${v.name}</span>`).join('')}
function addCity(k){if(state.cities.includes(k))return;state.cities.push(k);state.cityDays[k]=3;rebuildDays();renderAll();saveAll()}
function removeCity(k){state.cities=state.cities.filter(c=>c!==k);delete state.cityDays[k];rebuildDays();renderAll();saveAll()}
function updateCityDays(k,v){state.cityDays[k]=Math.max(1,Math.min(20,parseInt(v)||1));rebuildDays();renderAll();saveAll()}

// ===== DAYS =====
function rebuildDays(){
const nd={},no=[];state.cities.forEach(c=>{const n=state.cityDays[c]||3;
for(let i=1;i<=n;i++){const id=c+'-d'+i;no.push(id);nd[id]=state.days[id]||{city:c,title:db.cities[c]?.name+' 第'+i+'天',items:[],costs:{hotel:!0,guide:!0,parking:!0,highway:!1,driverMeal:!1,driverOvernight:!1}};
if(!state.days[id]){nd[id].items=[{time:'09:00',desc:'酒店出发',type:'transport',cost:0},{time:'12:00',desc:'午餐',type:'meal',cost:0},{time:'18:00',desc:'晚餐',type:'meal',cost:0}];}}});
state.days=nd;state.dayOrder=no;
}

function ti(t){const m={sight:'🎯',meal:'🍽️',transport:'🚐',hotel:'🏨',free:'🆓',other:'📌'};return m[t]||'📌'}
function tl(t){const m={sight:'景点',meal:'餐饮',transport:'交通',hotel:'住宿',free:'自由',other:'其他'};return m[t]||t}

function renderDays(){
const cEl=$_('dayCards');const tEl=$_('mainToolbar');const eEl=$_('mainEmpty');
if(!state.dayOrder.length){eEl.style.display='block';tEl.style.display='none';cEl.innerHTML='';return}
eEl.style.display='none';tEl.style.display='flex';
const r=db.rates;const ss=r.season_pct||0;const hs=state.hotelStar||'4';const hr=db.rates['hotel_'+hs]||3500;

cEl.innerHTML=state.dayOrder.map((id,i)=>{const d=state.days[id];if(!d||!d.costs)return'';const c=db.cities[d.city];const attrs=(db.attractions[d.city]||[]).map(a=>`<option value="${a.id}">${a.name} (₽${a.cost})</option>`).join('');
let dayCost=0;if(d.costs.hotel)dayCost+=hr*state.rooms;if(d.costs.guide)dayCost+=r.guide_cn_day||25000;
if(d.costs.parking)dayCost+=(r.parking||2500);if(d.costs.highway)dayCost+=(r.highway||1500);
if(d.costs.driverMeal)dayCost+=(r.driver_meal||800);if(d.costs.driverOvernight)dayCost+=(r.driver_overnight||3000);
d.items.forEach(it=>{if(it.cost)dayCost+=it.cost*state.pax;if(it.needRu&&it.ruCost)dayCost+=it.ruCost});

return `<div class="day-card open" id="dc${i}">
<div class="dc-header" onclick="toggleDay(${i})">
<span class="dc-arrow">▶</span><span class="dc-num">D${i+1}</span><span class="dc-city">${c?.emoji||''} ${c?.name||''}</span>
<span class="dc-title">${d.title}</span>
<span class="dc-costs">日成本 <span>₽${Math.round(dayCost).toLocaleString()}</span></span>
<div class="dc-actions"><button onclick="event.stopPropagation();moveDay(${i},-1)">⬆</button><button onclick="event.stopPropagation();moveDay(${i},1)">⬇</button><button onclick="event.stopPropagation();removeDay('${id}')" style="color:var(--red)">🗑</button></div>
</div>
<div class="dc-body">
<div class="cost-toggles">
<label class="${d.costs.hotel?'checked':''}" onclick="event.stopPropagation();toggleDayCost('${id}','hotel')"><input type="checkbox" ${d.costs.hotel?'checked':''}>🏨 酒店 ${hs}星</label>
<label class="${d.costs.guide?'checked':''}" onclick="event.stopPropagation();toggleDayCost('${id}','guide')"><input type="checkbox" ${d.costs.guide?'checked':''}>👨 中文导游</label>
<label class="${d.costs.parking?'checked':''}" onclick="event.stopPropagation();toggleDayCost('${id}','parking')"><input type="checkbox" ${d.costs.parking?'checked':''}>🅿️ 停车</label>
<label class="${d.costs.highway?'checked':''}" onclick="event.stopPropagation();toggleDayCost('${id}','highway')"><input type="checkbox" ${d.costs.highway?'checked':''}>🛣️ 高速</label>
<label class="${d.costs.driverMeal?'checked':''}" onclick="event.stopPropagation();toggleDayCost('${id}','driverMeal')"><input type="checkbox" ${d.costs.driverMeal?'checked':''}>🍱 司机餐</label>
<label class="${d.costs.driverOvernight?'checked':''}" onclick="event.stopPropagation();toggleDayCost('${id}','driverOvernight')"><input type="checkbox" ${d.costs.driverOvernight?'checked':''}>🌙 司机过夜</label>
</div>
<div class="dc-section"><h5>活动安排</h5>
${d.items.map((item,ji)=>`<div class="day-item"><div class="di-time"><input value="${item.time}" onchange="updItem('${id}',${ji},'time',this.value)"></div><div class="di-desc"><span>${ti(item.type)}</span><input value="${item.desc}" placeholder="描述" onchange="updItem('${id}',${ji},'desc',this.value)"></div><div class="di-type">${tl(item.type)}</div><div class="di-del" onclick="delItem('${id}',${ji})">✕</div></div>`).join('')}
<div class="day-add-row"><select id="asel_${id}"><option value="">+ 景点库添加</option>${attrs}</select><button onclick="addAttrItem('${id}')">+景点</button></div>
<div class="day-add-custom"><input id="cinp_${id}" placeholder="自定义活动..." onkeydown="if(event.key==='Enter')addCustItem('${id}')"><button onclick="addCustItem('${id}')">+自定义</button></div>
</div></div></div>`}).join('');
}

function toggleDay(i){
const el=document.getElementById('dc'+i);if(!el)return;el.classList.toggle('open');
const arrow=el.querySelector('.dc-arrow');if(arrow)arrow.style.transform=el.classList.contains('open')?'rotate(90deg)':'';
}
function expandAll(){document.querySelectorAll('.day-card').forEach(el=>el.classList.add('open'));document.querySelectorAll('.dc-arrow').forEach(el=>el.style.transform='rotate(90deg)')}
function collapseAll(){document.querySelectorAll('.day-card').forEach(el=>el.classList.remove('open'));document.querySelectorAll('.dc-arrow').forEach(el=>el.style.transform='')}

function toggleDayCost(id,costKey){if(!state.days[id])return;state.days[id].costs[costKey]=!state.days[id].costs[costKey];renderDays();recalc()}
function updItem(id,ji,f,v){if(state.days[id]?.items[ji]){state.days[id].items[ji][f]=v;recalc()}}
function delItem(id,ji){if(state.days[id]){state.days[id].items.splice(ji,1);renderDays();recalc()}}
function addAttrItem(id){const sel=document.getElementById('asel_'+id);if(!sel||!sel.value)return;const ck=state.days[id]?.city;const a=(db.attractions[ck]||[]).find(x=>x.id===sel.value);if(!a)return;state.days[id].items.push({time:'10:00',desc:a.name,type:a.type,cost:a.cost,needRu:a.needRu,ruCost:a.ruCost||0});renderDays();recalc()}
function addCustItem(id){const inp=document.getElementById('cinp_'+id);if(!inp||!inp.value.trim())return;state.days[id].items.push({time:'10:00',desc:inp.value.trim(),type:'other',cost:0});inp.value='';renderDays();recalc()}
function removeDay(id){const i=state.dayOrder.indexOf(id);if(i>-1){state.dayOrder.splice(i,1);delete state.days[id]};if(!state.dayOrder.length){state.cities=[];state.cityDays={}};renderAll();recalc();saveAll()}
function moveDay(i,dir){const ni=i+dir;if(ni<0||ni>=state.dayOrder.length)return;[state.dayOrder[i],state.dayOrder[ni]]=[state.dayOrder[ni],state.dayOrder[i]];renderAll();saveAll()}

// ===== CALC =====
function recalc(){
state.pax=parseInt($_('paxNum').value)||1;state.rooms=parseInt($_('roomNum').value)||1;
state.busType=$_('busType').value;state.margin=parseInt($_('marginPct').value)||0;state.hotelStar=$_('hotelStar').value;
$_('marginVal').textContent=state.margin+'%';$_('groupName').value=state.name||'';
$_('groupType').value=state.groupType||'family';$_('hotelStar').value=state.hotelStar||'4';

if(!state.dayOrder.length){$_('qsCost').textContent='₽0';$_('qsRetail').textContent='¥0';$_('qsPer').textContent='请添加行程';$_('quoteItems').innerHTML='';return}

const r=db.rates;const td=state.dayOrder.length;const pax=state.pax;const rooms=state.rooms;
const hs=state.hotelStar||'4';const hr=db.rates['hotel_'+hs]||3500;
const ss=r.season_pct||0;const busDays=Math.max(1,td-1);
const hourlyRate=state.busType==='bus'?(r.bus_hour||3510):(r.minibus_hour||2500);
const transportTotal=Math.round(hourlyRate*8*busDays*(1+ss));

let hotelTotal=0,guideTotal=0,parkingTotal=0,highwayTotal=0,driverMealTotal=0,driverOvernightTotal=0;
let attrCost=0,ruGuideTotal=0,mealCost=0;

state.dayOrder.forEach(id=>{
const d=state.days[id];if(!d||!d.costs)return'';
if(d.costs.hotel)hotelTotal+=hr*rooms;
if(d.costs.guide)guideTotal+=(r.guide_cn_day||25000);
if(d.costs.parking)parkingTotal+=(r.parking||2500);
if(d.costs.highway)highwayTotal+=(r.highway||1500);
if(d.costs.driverMeal)driverMealTotal+=(r.driver_meal||800);
if(d.costs.driverOvernight)driverOvernightTotal+=(r.driver_overnight||3000);
if(d.items)(d.items||[]).forEach(it=>{if(it.cost)attrCost+=it.cost*pax;if(it.needRu&&it.ruCost)ruGuideTotal+=it.ruCost});
});
mealCost=Math.round(((r.meal_lunch||1500)+(r.meal_dinner||2000))*pax*Math.max(0,td-2));

const trainLegs=Math.max(0,state.cities.length-1);
const trainCost=Math.round(((r.train_spb||6000)+(r.train_other||4000))/2*2*trainLegs*pax);
const regCost=Math.round((r.registration||350)*pax);

const totalCost=Math.round(transportTotal+hotelTotal+guideTotal+parkingTotal+highwayTotal+driverMealTotal+driverOvernightTotal+attrCost+ruGuideTotal+mealCost+trainCost+regCost);
const retail=Math.round(totalCost*(1+state.margin/100)/12.5);
const ppCost=Math.round(totalCost/pax);const ppRetail=Math.round(retail/pax);

$_('qsCost').textContent='₽'+totalCost.toLocaleString();
$_('qsRetail').textContent='¥'+retail.toLocaleString();
$_('qsPer').textContent='人均成本 ₽'+ppCost.toLocaleString()+' · 人均零售 ¥'+ppRetail.toLocaleString();

let items='';
items+=`<div class="qi"><span>🚐 用车 (${busDays}天)</span><span class="qa">₽${transportTotal.toLocaleString()}</span></div>`;
items+=`<div class="qi"><span>👨 中文导游 (${td}天)</span><span class="qa">₽${guideTotal.toLocaleString()}</span></div>`;
items+=`<div class="qi"><span>🏨 酒店${hs}星 (${rooms}间×${td}晚)</span><span class="qa">₽${hotelTotal.toLocaleString()}</span></div>`;
items+=`<div class="qi"><span>🍽️ 餐饮 (${td}天)</span><span class="qa">₽${mealCost.toLocaleString()}</span></div>`;
items+=`<div class="qi"><span>🎫 景点门票</span><span class="qa">₽${attrCost.toLocaleString()}</span></div>`;
if(ruGuideTotal>0)items+=`<div class="qi"><span>🎓 俄语博物馆导游</span><span class="qa">₽${ruGuideTotal.toLocaleString()}</span></div>`;
if(parkingTotal>0)items+=`<div class="qi"><span>🅿️ 停车费</span><span class="qa">₽${parkingTotal.toLocaleString()}</span></div>`;
if(highwayTotal>0)items+=`<div class="qi"><span>🛣️ 高速费</span><span class="qa">₽${highwayTotal.toLocaleString()}</span></div>`;
if(driverMealTotal>0)items+=`<div class="qi"><span>🍱 司机餐费</span><span class="qa">₽${driverMealTotal.toLocaleString()}</span></div>`;
if(driverOvernightTotal>0)items+=`<div class="qi"><span>🌙 司机过夜</span><span class="qa">₽${driverOvernightTotal.toLocaleString()}</span></div>`;
items+=`<div class="qi"><span>🚄 城际交通</span><span class="qa">₽${trainCost.toLocaleString()}</span></div>`;
items+=`<div class="qi"><span>📋 注册费</span><span class="qa">₽${regCost.toLocaleString()}</span></div>`;
$_('quoteItems').innerHTML=items;
saveAll();
}

h+=`<tr><td colspan="3" class="gt">成本合计 ₽${totalCost.toLocaleString()} ≈ ¥${Math.round(totalCost/12.5).toLocaleString()}<br>零售价（含${marg}%毛利）¥${retail.toLocaleString()}<br>人均 ¥${ppR.toLocaleString()}</td></tr></table>`;

function savePlan(){saveAll();toast('💾 已保存')}

const data={db,state};const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`adu_plan_${state.id}.json`;a.click();toast('📤 已导出')}
function importPlan(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.db){db={...db,...d.db,users:d.db.users||db.users}}if(d.state)state={...defaultState(),...d.state};saveAll();init();toast('📥 已导入')}catch(ex){toast('❌ 导入失败')}};r.readAsText(f);e.target.value=''}
