<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿杜俄旅 · 产品定制与报价核算系统 0.32</title>
<style>
:root {
  --p: #C0392B; --p2: #8B1A1A; --pl: #F5D6D3; --g: #D4A017; --gl: #FEF3D0;
  --bg: #FDF8F3; --c: #FFFFFF; --t: #2C2C2C; --t2: #6B6B6B;
  --b: #E5E0DB; --b2: #F0EBE6; --s: #27AE60; --w: #E67E22;
  --font: 'Inter',-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  --font-h: 'Playfair Display','Inter',serif;
  --r: 12px; --r-sm: 8px; --r-lg: 16px; --sh: 0 2px 12px rgba(139,26,26,.08); --sh-lg: 0 4px 24px rgba(139,26,26,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--t);line-height:1.6;padding:0;min-height:100vh}
.c{max-width:1320px;margin:0 auto;padding:0 20px}

/* Header */
.hdr{background:linear-gradient(135deg,var(--p2),var(--p));color:#fff;padding:32px 0 28px;margin-bottom:24px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:-50%;right:-10%;width:300px;height:300px;background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 70%);border-radius:50%}
.hdr::after{content:'\1F1F7\1F1FA';position:absolute;right:40px;top:50%;transform:translateY(-50%);font-size:56px;opacity:.12}
.hdr-inner{max-width:1320px;margin:0 auto;padding:0 20px;position:relative;z-index:1}
.hdr h1{font-family:var(--font-h);font-size:28px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
.hdr p{font-size:14px;opacity:.85;font-weight:400}

/* Cards */
.card{background:var(--c);border-radius:var(--r-lg);padding:24px 28px;margin-bottom:20px;box-shadow:var(--sh);border:1px solid var(--b2);transition:box-shadow .2s}
.card:hover{box-shadow:var(--sh-lg)}
.card h2{font-family:var(--font-h);font-size:17px;color:var(--p);margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--pl);display:flex;align-items:center;gap:10px}

/* Form */
.fr{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:14px}
.fg{flex:1;min-width:160px}
.fg label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:var(--t2);letter-spacing:.02em}
.fg input,.fg select{width:100%;padding:9px 12px;border:1.5px solid var(--b);border-radius:var(--r-sm);font-size:13px;background:#fff;transition:border-color .2s,box-shadow .2s;color:var(--t)}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(192,57,43,.12)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;min-height:38px;text-decoration:none;letter-spacing:.01em}
.btn-p{background:linear-gradient(135deg,var(--p2),var(--p));color:#fff;box-shadow:0 2px 8px rgba(192,57,43,.25)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(192,57,43,.35)}
.btn-s{background:linear-gradient(135deg,#219a52,#27AE60);color:#fff;box-shadow:0 2px 8px rgba(39,174,96,.25)}
.btn-s:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(39,174,96,.35)}
.btn-o{background:transparent;color:var(--p);border:1.5px solid var(--p)}.btn-o:hover{background:var(--pl)}
.btn-d{background:#e74c3c;color:#fff}.btn-d:hover{background:#c0392b}
.btn-sm{padding:6px 12px;font-size:11px;min-height:30px}
.btn-xs{padding:3px 8px;font-size:10px;border-radius:5px;min-height:24px}
.bg{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}

/* City Selector */
.city-pool{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.city-chip{padding:6px 16px;border-radius:20px;font-size:12px;cursor:pointer;border:1.5px solid var(--b);transition:all .2s;background:#fff;user-select:none;min-height:34px;display:flex;align-items:center;gap:5px;font-weight:500}
.city-chip:hover{border-color:var(--p);background:#FFF5F3}
.city-chip.used{background:var(--p);color:#fff;border-color:var(--p)}
.city-order{display:flex;flex-direction:column;gap:6px;margin:8px 0}
.city-order-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#FAF6F2;border-radius:var(--r-sm);border:1px solid var(--b2);transition:all .2s}
.city-order-item:hover{border-color:var(--pl);background:#FFF8F5}
.city-order-item .order-num{font-weight:700;color:var(--p);min-width:22px;font-size:13px}
.city-order-item .city-name{flex:1;font-size:13px;font-weight:600}
.city-order-item .day-ctrl{display:flex;align-items:center;gap:4px}
.city-order-item .day-ctrl input{width:38px;text-align:center;padding:4px;border:1.5px solid var(--b);border-radius:5px;font-size:12px;font-weight:600}
.city-order-item .day-ctrl span{font-size:12px;color:var(--t2)}
.city-order-item .move-btn{font-size:14px;cursor:pointer;padding:4px 6px;border-radius:4px;color:var(--t2)}.city-order-item .move-btn:hover{background:var(--pl);color:var(--p)}
.city-order-item .del-btn{cursor:pointer;color:#e74c3c;font-size:18px;padding:4px;opacity:.6}.city-order-item .del-btn:hover{opacity:1}

/* Day Cards */
.day-list{display:flex;flex-direction:column;gap:10px}
.day-card{border:1px solid var(--b);border-radius:var(--r);overflow:hidden;transition:box-shadow .2s}
.day-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.day-hdr{display:flex;align-items:center;gap:8px;padding:10px 16px;cursor:pointer;user-select:none;transition:background .15s;min-height:44px}
.day-hdr:hover{filter:brightness(.97)}
.day-hdr .dd-num{font-weight:700;color:var(--p);min-width:50px;font-size:13px;flex-shrink:0}
.day-hdr .dd-city{font-size:12px;color:var(--t2);min-width:60px;flex-shrink:0;font-weight:500}
.day-hdr .dd-theme{flex:1;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.day-hdr .dd-ctrl{display:flex;gap:3px;flex-shrink:0}
.day-hdr .dd-toggle{font-size:10px;color:#bbb;margin-left:4px;flex-shrink:0;transition:transform .2s}
.day-body{padding:16px;display:none;border-top:1px solid var(--b2);background:#FAFAFA}
.day-body.open{display:block}
.dr{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.dr .df{flex:1;min-width:120px}
.dr .df label{font-size:11px;color:var(--t2);display:block;margin-bottom:3px;font-weight:500}
.dr .df input,.dr .df select{width:100%;padding:5px 8px;border:1.5px solid var(--b);border-radius:6px;font-size:12px;background:#fff}
.dr .df input:focus,.dr .df select:focus{outline:none;border-color:var(--p)}

/* Attractions Grid */
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:3px;margin:8px 0}
.ai{display:flex;align-items:center;gap:5px;font-size:12px;padding:4px 8px;border-radius:6px;cursor:pointer;min-height:30px;transition:background .15s}
.ai:hover{background:var(--pl)}
.ai input{accent-color:var(--p);width:15px;height:15px;flex-shrink:0}
.ap{font-size:10px;color:#aaa;white-space:nowrap}
.ab{font-size:10px;padding:1px 5px;border-radius:3px;background:#F0EBE6;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px}
.st{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
.st .tag{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;background:var(--pl);color:var(--p);border-radius:12px;font-size:11px;font-weight:500}
.st .tag .del{cursor:pointer;font-size:13px;color:#999;margin-left:3px;padding:2px}.st .tag .del:hover{color:#e74c3c}
.mr{display:flex;gap:14px;flex-wrap:wrap;margin:8px 0;align-items:center}
.mr label{font-size:12px;display:flex;align-items:center;gap:4px;min-height:28px}
.mr select{font-size:11px;padding:3px 6px;border:1.5px solid var(--b);border-radius:5px}

/* Tables */
.tb-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:8px 0;border-radius:var(--r-sm);border:1px solid var(--b)}
.qt{width:100%;border-collapse:collapse;font-size:13px}
.qt th,.qt td{padding:10px 14px;text-align:right;border-bottom:1px solid var(--b2)}
.qt th{background:#FAF6F2;text-align:center;font-weight:600;font-size:12px;color:var(--t2);white-space:nowrap}
.qt td:first-child{text-align:left;font-weight:500}
.qt tr:last-child td{border-bottom:none}
.qt tr:hover td{background:#FFF8F5}
.qt .trt{background:#FDF0ED!important;font-weight:700;font-size:14px;color:var(--p)}
.qt .trt td{border-top:2px solid var(--pl)}

/* Output */
.ob{margin-top:16px;padding:20px 24px;background:#1E1E1E;color:#E0E0E0;border-radius:var(--r-lg);display:none;font-size:13px;line-height:1.8;max-height:600px;overflow-y:auto;white-space:pre-wrap;font-family:'Cascadia Code','Fira Code','JetBrains Mono',Menlo,monospace;word-break:break-word;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.ob.open{display:block}

/* Chat */
.chat-t{position:fixed;bottom:28px;right:28px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--p2),var(--p));color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(192,57,43,.4);z-index:1000;display:flex;align-items:center;justify-content:center;transition:transform .2s,box-shadow .2s;touch-action:manipulation}
.chat-t:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(192,57,43,.5)}
.chat-p{position:fixed;bottom:92px;right:28px;width:400px;height:580px;max-width:calc(100vw - 40px);max-height:calc(100vh - 130px);background:#fff;border-radius:var(--r-lg);box-shadow:0 8px 40px rgba(0,0,0,.18);z-index:999;display:none;flex-direction:column;overflow:hidden;border:1px solid var(--b)}
.chat-p.on{display:flex}
.chat-h{background:linear-gradient(135deg,var(--p2),var(--p));color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-h .av{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:20px}
.chat-h .info{flex:1}.chat-h .info h3{font-size:14px;font-weight:600}.chat-h .info p{font-size:10px;opacity:.8}
.chat-h .cb{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px;line-height:1}
.chat-m{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:#FAF8F5}
.chat-msg{max-width:88%;padding:10px 16px;border-radius:14px;font-size:13px;line-height:1.6;animation:mi .3s ease}
@keyframes mi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.chat-u{background:var(--p);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-a{background:#fff;color:var(--t);align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.chat-i{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--b);background:#fff;flex-shrink:0}
.chat-i textarea{flex:1;border:1.5px solid var(--b);border-radius:10px;padding:8px 12px;font-size:13px;resize:none;height:40px;max-height:80px;line-height:1.4;font-family:inherit;transition:border-color .2s}
.chat-i textarea:focus{outline:none;border-color:var(--p)}
.chat-i .sb{width:40px;height:40px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--p2),var(--p));color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation;transition:transform .15s}
.chat-i .sb:disabled{background:#ccc;cursor:not-allowed;transform:none}
.chat-i .sb:hover:not(:disabled){transform:scale(1.08)}
.chat-bar{display:flex;align-items:center;gap:6px;padding:8px 14px;border-bottom:1px solid var(--b2);background:#FFF8F5;flex-shrink:0;flex-wrap:wrap}
.chat-bar input{padding:5px 10px;border:1.5px solid var(--b);border-radius:6px;font-size:12px;transition:border-color .2s}
.chat-bar input:focus{outline:none;border-color:var(--p)}
.chat-bar .cb-btn{padding:4px 12px;border:none;border-radius:5px;font-size:11px;cursor:pointer;white-space:nowrap;font-weight:500;transition:all .15s}
.chat-bar .cb-btn.p{background:var(--p);color:#fff}.chat-bar .cb-btn.p:hover{background:var(--p2)}
.chat-bar .cb-btn.d{border:1px solid #e74c3c;color:#e74c3c;background:transparent}.chat-bar .cb-btn.d:hover{background:#fff0ee}
.chat-bar .st{font-size:10px;color:var(--t2);white-space:nowrap}
.chat-bar .st.ok{color:var(--s);font-weight:600}
.ct{display:flex;gap:4px;padding:10px 16px;align-items:center;align-self:flex-start;background:#fff;border-radius:14px;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.ct .d{width:7px;height:7px;border-radius:50%;background:#ccc;animation:dp 1.2s infinite}
.ct .d:nth-child(2){animation-delay:.2s}.ct .d:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,60%,100%{transform:scale(1);opacity:.4}30%{transform:scale(1.3);opacity:1}}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 28px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;text-align:center;max-width:90vw;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

.city-colors{display:none}

/* ===== RESPONSIVE: DESKTOP FIRST ===== */
@media(max-width:1024px){
  .hdr h1{font-size:24px}.card{padding:20px}.c{padding:0 16px}
}
@media(max-width:768px){
  .hdr{padding:24px 0 20px}.hdr h1{font-size:20px}.hdr::after{font-size:40px;right:20px}
  .card{padding:16px 18px;border-radius:var(--r);margin-bottom:16px}
  .card h2{font-size:15px}
  .fg{min-width:140px}
  .ag{grid-template-columns:1fr 1fr}
  .day-hdr .dd-city{display:none}
  .day-hdr .dd-num{min-width:36px;font-size:11px}
  .day-hdr .dd-theme{font-size:12px}
  .chat-p{right:10px;bottom:78px;width:calc(100vw - 20px);height:calc(100vh - 110px);border-radius:var(--r)}
  .chat-t{right:16px;bottom:16px;width:48px;height:48px;font-size:20px}
  .qt{font-size:12px}.qt th,.qt td{padding:7px 8px}
  .dr .df{min-width:calc(50% - 8px)}
}
@media(max-width:480px){
  .hdr{padding:20px 0 16px}.hdr h1{font-size:17px}.hdr p{font-size:12px}
  .card{padding:12px 14px;border-radius:10px;margin-bottom:12px}
  .fg{min-width:100%}
  .ag{grid-template-columns:1fr}
  .city-chip{font-size:11px;padding:5px 12px;min-height:30px}
  .city-order-item{padding:8px 10px;gap:6px}
  .city-order-item .day-ctrl{width:100%}
  .day-hdr{padding:8px 10px;gap:5px}
  .day-body{padding:10px}
  .dr .df{min-width:100%}
  .chat-p{right:6px;bottom:72px;width:calc(100vw - 12px);height:calc(100vh - 90px);border-radius:10px}
  .chat-t{right:12px;bottom:12px;width:44px;height:44px;font-size:18px}
}

/* Print */
@media print{.no-print{display:none!important}body{background:#fff}.card{box-shadow:none;border:1px solid #ddd;break-inside:avoid}.hdr{background:var(--p2)!important;-webkit-print-color-adjust:exact}.ob{max-height:none!important;background:#fff!important;color:var(--t)!important}}
</style>
</head>
<body>
<div class="container" id="app">
<div class="header no-print">
<h1>🇷🇺 阿杜俄旅 · 产品定制与报价核算</h1>
<p>俄罗斯旅游产品定制工具 · 实时成本核算 · 一键生成行程单+报价单</p>
</div>

<!-- ===== 第1步：基础信息 ===== -->
<div class="card no-print">
<h2>📋 ① 基础信息</h2>
<div class="form-row">
<div class="form-group"><label>产品名称</label><input type="text" id="f_name" value="莫斯科+圣彼得堡"></div>
<div class="form-group"><label>客户类型</label>
<select id="f_client"><option value="family">家庭团</option><option value="group">常规团</option><option value="vip">VIP精品团</option></select></div>
<div class="form-group"><label>出行人数</label><input type="number" id="f_people" value="5" min="1" max="50" onchange="onParamChange()"></div>
<div class="form-group"><label>行程天数（含首尾）</label><input type="number" id="f_days" value="9" min="2" max="30" onchange="onParamChange()"></div>
</div>
<div class="form-row">
<div class="form-group"><label>出发城市</label>
<select id="f_depart"><option>北京</option><option>上海</option><option>广州</option><option>深圳</option><option>成都</option><option>香港</option></select></div>
<div class="form-group"><label>住宿标准</label>
<select id="f_hotel" onchange="onParamChange()">
<option value="3">★★★ 三星</option><option value="4" selected>★★★★ 四星</option><option value="5">★★★★★ 五星</option>
</select></div>
<div class="form-group"><label>用车类型</label>
<select id="f_vehicle" onchange="onParamChange()">
<option value="minibus">中巴(18座 舒适≤15人)</option>
<option value="bus">大巴(35-40座)</option>
<option value="sedan">轿车/商务(1-4人)</option>
</select></div>
<div class="form-group"><label>是否旺季</label>
<select id="f_peak" onchange="onParamChange()">
<option value="0">平季</option><option value="1">旺季(7-8月,+15%)</option>
</select></div>
</div>
</div>

<!-- ===== 第2步：选择城市 ===== -->
<div class="card no-print">
<h2>🏙️ ② 选择游览城市</h2>
<div class="city-grid" id="cityGrid"></div>
<div id="cityDayAlloc" style="display:none;margin-top:10px;padding:12px;background:#f8f4f0;border-radius:10px;">
<div style="font-size:13px;font-weight:600;margin-bottom:8px;">分配各城市天数 <span id="cityDayTotal" style="font-weight:400;color:#888;font-size:12px;">(共0天)</span></div>
<div class="form-row" id="cityDayInputs"></div>
<div id="cityDayTip" style="font-size:12px;margin-top:6px;"></div>
</div>
</div>

<!-- ===== 第3步：每日行程 ===== -->
<div class="card no-print">
<h2>📅 ③ 每日行程编辑 <span id="dayCount" style="font-weight:400;font-size:13px;color:#888;"></span></h2>
<div id="dayEditor"><p style="color:#999;text-align:center;padding:20px;">请先选择城市，系统自动生成行程框架</p></div>
</div>

<!-- ===== 第4步：报价核算 ===== -->
<div class="card no-print">
<h2>💰 ④ 实时报价核算 <span id="priceTag" style="font-weight:400;font-size:13px;color:#888;"></span></h2>
<div id="priceSummary"><p style="color:#999;text-align:center;padding:16px;">配置行程后自动核算</p></div>
</div>

<!-- ===== 操作按钮 ===== -->
<div class="btn-group no-print" style="justify-content:center;margin:20px 0;">
<button class="btn btn-success" onclick="genDoc()">📄 生成行程单+报价单</button>
<button class="btn btn-primary" onclick="window.print()">🖨️ 打印/PDF</button>
<button class="btn btn-outline" onclick="saveToFile()">💾 保存方案</button>
<button class="btn btn-outline" onclick="loadFromFile()">📂 载入方案</button>
<button class="btn btn-danger" onclick="resetAll()">🔄 重置</button>
</div>

<!-- ===== 文档输出 ===== -->
<div class="output-box" id="outputBox"></div>
</div>

<div id="toast" class="toast"></div>

<script>
// ===== 全局定价参数 (基于实际成本核算) =====
const PRICE = {
  vehicle: { bus:3510, minibus:2500, sedan:1800 },
  // Hotel: per ROOM per night (双床标间)
  hotel: { 3:5000, 4:7000, 5:12000 },
  guideHotel: { 3:5000, 4:7500, 5:12000 },
  driverHotel: { 3:3500, 4:5500, 5:8000 },
  // Guide: 全天30000, 半日(接送)15000
  guideFull: 30000,
  guideHalf: 15000,
  // Meals per person: 中餐
  meal: { lunch_cn:2300, dinner_cn:2300, lunch_ru:1400, dinner_ru:1200 },
  // Driver meal per meal
  driverMeal: 1500,
  // Parking per day
  parking: 2500,
  // Transfer (airport/station pickup/drop)
  transfer: 13000,
  // Train
  highspeed: 6000,
};

// ===== 景点数据库 =====

const CITY_NAMES = { moscow:'莫斯科', spb:'圣彼得堡', tula:'图拉', sergiev:'谢尔盖耶夫', suzdal:'苏兹达里+弗拉基米尔' };
const CLIENT_NAMES = { family:'家庭团', group:'常规团', vip:'VIP精品团' };
const VEHICLE_NAMES = { bus:'大巴(35-40座)', minibus:'中巴(18座)', sedan:'轿车/商务车' };
const HOTEL_NAMES = { 3:'★★★三星', 4:'★★★★四星', 5:'★★★★★五星' };
const WEEKDAYS = ['日','一','二','三','四','五','六'];

// ===== 核心状态 =====
let dayData = [];        // Array of day objects
let selectedCities = []; // Currently selected cities

// ===== 读取表单值 =====
function $g(id){return document.getElementById(id)}
function people(){return parseInt($g('f_people').value)||5}
function days(){return parseInt($g('f_days').value)||9}
function hotelStar(){return parseInt($g('f_hotel').value)||4}
function vehicle(){return $g('f_vehicle').value}
function isPeak(){return $g('f_peak').value==='1'}
function peakMul(){return isPeak()?1.15:1}
function hotelCost(){return PRICE.hotel[hotelStar()]}
function guideHotel(){return PRICE.guideHotel[hotelStar()]}
function driverHotel(){return PRICE.driverHotel[hotelStar()]}
function vehCost(){return PRICE.vehicle[vehicle()]}

// ===== 城市选择 =====
function initCities(){
  const g=$g('cityGrid');
  g.innerHTML=Object.entries(CITY_NAMES).map(([k,v])=>
    `<div class="city-chip${selectedCities.includes(k)?' selected':''}" data-city="${k}" onclick="toggleCity('${k}')">
      <input type="checkbox" ${selectedCities.includes(k)?'checked':''}>
      <span>${v}</span>
    </div>`
  ).join('');
  updateCityAlloc();
}

function toggleCity(city){
  const idx=selectedCities.indexOf(city);
  if(idx>=0) selectedCities.splice(idx,1);
  else selectedCities.push(city);
  initCities();
  rebuildAll();
}

function updateCityAlloc(){
  const alloc=$g('cityDayAlloc');
  const inputs=$g('cityDayInputs');
  const total=days();
  if(selectedCities.length<2){alloc.style.display='none';return}
  alloc.style.display='block';
  $g('cityDayTotal').textContent=`(共${total}天)`;
  let html='';
  selectedCities.forEach((c,i)=>{
    const existing=$g('cd_'+c);
    const val=existing?parseInt(existing.value)||0:Math.floor(total/selectedCities.length);
    html+=`<div class="form-group" style="min-width:120px;">
      <label>${CITY_NAMES[c]}</label>
      <div class="city-day-input">
        <input type="number" id="cd_${c}" value="${val}" min="1" max="20" onchange="onCityDayChange()">
        <span style="font-size:11px;color:#888;">天</span>
      </div>
    </div>`;
  });
  inputs.innerHTML=html;
  validateCityDays();
}

function onCityDayChange(){validateCityDays();rebuildAll()}

function validateCityDays(){
  let sum=0;
  selectedCities.forEach(c=>{sum+=parseInt(($g('cd_'+c)||{value:0}).value)||0});
  const tip=$g('cityDayTip');
  const total=days();
  if(sum===total){tip.style.color='#27ae60';tip.textContent='✅ 天数分配正确';return true}
  else{tip.style.color='#e74c3c';tip.textContent='❌ 当前合计'+sum+'天，应为'+total+'天';return false}
}

function getCityDays(city){return parseInt(($g('cd_'+city)||{value:0}).value)||0}

// ===== 核心：当参数变化时重建 =====
function onParamChange(){
  updateCityAlloc();
  // Don't auto-rebuild on every number input to avoid losing edits; only on confirm
}

function rebuildAll(){
  buildDays();
  renderDays();
  calcPrice();
}

// ===== 构建行程框架 =====
function buildDays(){
  const total=days();
  if(selectedCities.length===0){dayData=[];renderDays();calcPrice();return}
  
  // Simplified logic: just create sequential days
  // First determine the sequence of cities per day
  let seq=[];
  let remaining=total;
  
  if(selectedCities.includes('moscow')&&selectedCities.includes('spb')){
    // Complex route: Moscow -> others -> SPB -> Moscow
    let md=getCityDays('moscow');
    let sd=getCityDays('spb');
    let others=selectedCities.filter(c=>c!=='moscow'&&c!=='spb');
    
    seq.push({city:'moscow',type:'arrival',label:'抵达莫斯科'});
    for(let i=1;i<md-1&&seq.length<total-1;i++)seq.push({city:'moscow',type:'sightseeing',label:'莫斯科游览'});
    
    others.forEach(c=>{
      let cd=getCityDays(c);
      if(seq.length<total-1){
        seq.push({city:c,type:'sightseeing',label:CITY_NAMES[c]+'游览'});
        for(let i=1;i<cd&&seq.length<total-1;i++)seq.push({city:c,type:'sightseeing',label:CITY_NAMES[c]+'游览'});
      }
    });
    
    if(seq.length<total-1){
      seq.push({city:'spb',type:'transfer_in',label:'🚄 高铁赴圣彼得堡'});
      for(let i=1;i<sd-1&&seq.length<total-1;i++)seq.push({city:'spb',type:'sightseeing',label:'圣彼得堡游览'});
    }
    seq.push({city:'spb',type:'departure',label:'送机/送站返程'});
  }
  else if(selectedCities.includes('moscow')&&selectedCities.includes('tula')){
    let md=getCityDays('moscow');
    let td=getCityDays('tula');
    let others=selectedCities.filter(c=>c!=='moscow'&&c!=='tula');
    
    seq.push({city:'moscow',type:'arrival',label:'抵达莫斯科'});
    for(let i=1;i<md-1&&seq.length<total-2;i++)seq.push({city:'moscow',type:'sightseeing',label:'莫斯科游览'});
    
    others.forEach(c=>{
      if(seq.length<total-2){seq.push({city:c,type:'sightseeing',label:CITY_NAMES[c]+'游览'});}
    });
    
    seq.push({city:'tula',type:'sightseeing',label:'图拉游览'});
    seq.push({city:'moscow',type:'departure',label:'送机返程'});
  }
  else {
    // Simple: all days in first city
    const mc=selectedCities[0];
    seq.push({city:mc,type:'arrival',label:'抵达'+CITY_NAMES[mc]});
    for(let i=1;i<total-1;i++)seq.push({city:mc,type:'sightseeing',label:CITY_NAMES[mc]+'游览'});
    seq.push({city:mc,type:'departure',label:'送机返程'});
  }
  
  // Trim/pad to match total
  while(seq.length>total)seq.pop();
  while(seq.length<total)seq.push({city:selectedCities[0]||'moscow',type:'sightseeing',label:'自由活动'});
  
  // Build dayData objects, preserving existing data where possible
  const oldData=dayData;
  dayData=seq.map((item,idx)=>{
    const old=oldData[idx]||{};
    const d=new Date(2026,6,11+idx);
    return {
      day:idx+1,
      date:(d.getMonth()+1)+'/'+d.getDate(),
      weekday:WEEKDAYS[d.getDay()],
      city:item.city,
      type:item.type,
      label:old.label||item.label,
      attractions:old.attractions||[],
      meals:old.meals||{breakfast:true,lunch:true,dinner:false,mealType:'cn'},
      vehicleHours:old.vehicleHours||(item.type==='arrival'||item.type==='departure'?4:item.type==='sightseeing'?10:6),
      parkingFee:old.parkingFee||2500,
      guideCost:old.guideCost||(item.type==='arrival'||item.type==='departure'?PRICE.guideHalf:PRICE.guideFull),
      customCost:old.customCost||0,
      customNote:old.customNote||'',
      _extraHotels:old._extraHotels||0,
    };
  });
}

      attrs.forEach(a=>{
        const checked=day.attractions.some(x=>x.id===a.id)?'checked':'';

function escHtml(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function toggleDay(idx){
  const b=$g('db_'+idx);
  if(b)b.classList.toggle('open');
}

function toggleAttr(di,aid,aname,acost){
  const day=dayData[di];
  const ei=day.attractions.findIndex(a=>a.id===aid);
  if(ei>=0)day.attractions.splice(ei,1);
  else day.attractions.push({id:aid,name:aname,cost:acost});
  refreshAttrs(di);
  calcPrice();
}
function removeAttr(di,aid){
  dayData[di].attractions=dayData[di].attractions.filter(a=>a.id!==aid);
  refreshAttrs(di);
  // Uncheck checkbox
  calcPrice();
}
function refreshAttrs(di){
  const c=$g('sa_'+di);
  if(!c)return;
  c.innerHTML=dayData[di].attractions.map(a=>
    `<span class="tag">${a.name} ${a.cost>0?a.cost+'₽':''}<span class="del" onclick="removeAttr(${di},'${a.id}')">✕</span></span>`
  ).join('');
}

// ===== 计算报价 =====
function calcPrice(){
  const ppl=people(),peak=peakMul(),vCost=vehCost(),hCost=hotelCost(),ghCost=guideHotel(),dhCost=driverHotel();
  const p=$g('priceSummary');
  
  if(dayData.length===0){p.innerHTML='<p style="color:#999;text-align:center;padding:16px;">请先配置行程</p>';return}
  
  // Calculate rooms needed: for family double rooms
  let rooms=Math.ceil(ppl/2);
  if(rooms<1)rooms=1;
  
  // Build per-day costs
  let dayCosts=[];
  let totals={vehicle:0,parking:0,guide:0,hotel:0,guideHotel:0,meals:0,tickets:0,driverMeal:0,custom:0};
  
  dayData.forEach((day,idx)=>{
    const mt=day.meals.mealType||'cn';
    const lunchPrice=mt==='cn'?PRICE.meal.lunch_cn:PRICE.meal.lunch_ru;
    const dinnerPrice=mt==='cn'?PRICE.meal.dinner_cn:(mt==='ru'?PRICE.meal.dinner_ru:PRICE.meal.dinner_cn);
    // mixed: lunch ru, dinner cn
    
    let v=day.vehicleHours*vCost*peak;
    let pk=day.parkingFee;
    let g=day.guideCost;
    let ho=(day.type!=='departure')?hCost*rooms:0;
    let gh=(day.type!=='departure')?ghCost+dhCost:0; // guide + driver hotel
    // If user set extra rooms
    if(day._extraHotels>0)gh+=hCost*day._extraHotels;
    
    let ml=(day.meals.lunch?lunchPrice*ppl:0)+(day.meals.dinner?dinnerPrice*ppl:0);
    let dm=(day.meals.lunch?PRICE.driverMeal:0)+(day.meals.dinner?PRICE.driverMeal:0);
    let tk=day.attractions.reduce((s,a)=>s+a.cost*ppl,0);
    let cu=day.customCost;
    
    let total=v+pk+g+ho+gh+ml+dm+tk+cu;
    dayCosts.push({day:day.day,label:day.label,city:CITY_NAMES[day.city]||day.city,
      vehicle:v,parking:pk,guide:g,hotel:ho,guideHotel:gh,meals:ml,driverMeal:dm,tickets:tk,custom:cu,total});
    
    totals.vehicle+=v; totals.parking+=pk; totals.guide+=g; totals.hotel+=ho; totals.guideHotel+=gh;
    totals.meals+=ml; totals.driverMeal+=dm; totals.tickets+=tk; totals.custom+=cu;
  });
  
  // High speed train
  let trainCost=0;
  const hasMoscow=selectedCities.includes('moscow');
  const hasSpb=selectedCities.includes('spb');
  if(hasMoscow&&hasSpb){
    const trips=dayData.some(d=>d.type==='transfer_out')?2:1;
    trainCost=PRICE.highspeed*ppl*trips;
  }
  
  // Transfers
  let transferCost=0;
  dayData.forEach(d=>{if(['arrival','departure','transfer_in','transfer_out'].includes(d.type))transferCost+=PRICE.transfer});
  
  const grandTotal=totals.vehicle+totals.parking+totals.guide+totals.hotel+totals.guideHotel+totals.meals+totals.driverMeal+totals.tickets+totals.custom+trainCost+transferCost;
  const perPerson=Math.round(grandTotal/ppl);
  const perPersonCny=Math.round(perPerson/13);
  const totalCny=Math.round(grandTotal/13);
  
  // Render summary
  let h=`<div style="font-size:12px;color:#888;margin-bottom:8px;">
    ${ppl}人 · ${rooms}间房 · ${HOTEL_NAMES[hotelStar()]} · ${VEHICLE_NAMES[vehicle()]}${isPeak()?' · 🌞旺季+15%':''}
    · 含导游/司机住宿
  </div>
  <table class="qt">
    <thead><tr><th>费用项目</th><th>金额(₽)</th><th>人均(₽)</th><th>人民币</th></tr></thead>
    <tbody>
      <tr><td>🚐 用车(含停车+司机餐)</td><td>${(totals.vehicle+totals.parking+totals.driverMeal).toLocaleString()}</td><td>${Math.round((totals.vehicle+totals.parking+totals.driverMeal)/ppl).toLocaleString()}</td><td>≈${Math.round((totals.vehicle+totals.parking+totals.driverMeal)/13).toLocaleString()}元</td></tr>
      <tr><td>👤 中文导游</td><td>${totals.guide.toLocaleString()}</td><td>${Math.round(totals.guide/ppl).toLocaleString()}</td><td>≈${Math.round(totals.guide/13).toLocaleString()}元</td></tr>
      <tr><td>🏨 住宿(含导游/司机)</td><td>${(totals.hotel+totals.guideHotel).toLocaleString()}</td><td>${Math.round((totals.hotel+totals.guideHotel)/ppl).toLocaleString()}</td><td>≈${Math.round((totals.hotel+totals.guideHotel)/13).toLocaleString()}元</td></tr>
      <tr><td>🍽️ 餐费</td><td>${totals.meals.toLocaleString()}</td><td>${Math.round(totals.meals/ppl).toLocaleString()}</td><td>≈${Math.round(totals.meals/13).toLocaleString()}元</td></tr>
      <tr><td>🎫 景点门票</td><td>${totals.tickets.toLocaleString()}</td><td>${Math.round(totals.tickets/ppl).toLocaleString()}</td><td>≈${Math.round(totals.tickets/13).toLocaleString()}元</td></tr>`;
  
  if(trainCost>0)h+=`<tr><td>🚄 高铁莫斯科↔彼得堡</td><td>${trainCost.toLocaleString()}</td><td>${Math.round(trainCost/ppl).toLocaleString()}</td><td>≈${Math.round(trainCost/13).toLocaleString()}元</td></tr>`;
  if(transferCost>0)h+=`<tr><td>🚐 接送机/站×${dayData.filter(d=>['arrival','departure','transfer_in','transfer_out'].includes(d.type)).length}次</td><td>${transferCost.toLocaleString()}</td><td>${Math.round(transferCost/ppl).toLocaleString()}</td><td>≈${Math.round(transferCost/13).toLocaleString()}元</td></tr>`;
  if(totals.custom>0)h+=`<tr><td>📌 其他附加</td><td>${totals.custom.toLocaleString()}</td><td>${Math.round(totals.custom/ppl).toLocaleString()}</td><td>≈${Math.round(totals.custom/13).toLocaleString()}元</td></tr>`;
  
  h+=`<tr class="tr-total"><td>★ 总计</td><td>${grandTotal.toLocaleString()}</td><td>${perPerson.toLocaleString()}</td><td>≈${totalCny.toLocaleString()}元</td></tr>
    <tr class="tr-total"><td>★ 人均</td><td colspan="3">${perPerson.toLocaleString()}₽ ≈ ${perPersonCny.toLocaleString()}元 (1元≈13₽)</td></tr>
    </tbody></table>`;
  
  // Day breakdown
  h+=`<div class="section-title">📅 每日费用明细</div>
  <table class="qt"><thead><tr><th>日</th><th>主题</th><th>用车</th><th>导游</th><th>住宿</th><th>餐</th><th>门票</th><th>小计</th></tr></thead><tbody>`;
  dayCosts.forEach(d=>{
    h+=`<tr><td>D${d.day}</td><td style="text-align:left;max-width:120px;overflow:hidden;text-overflow:ellipsis;">${d.city} ${d.label}</td>
      <td>${d.vehicle.toLocaleString()}</td><td>${d.guide.toLocaleString()}</td><td>${(d.hotel+d.guideHotel).toLocaleString()}</td>
      <td>${d.meals.toLocaleString()}</td><td>${d.tickets.toLocaleString()}</td>
      <td><strong>${d.total.toLocaleString()}</strong></td></tr>`;
  });
  h+=`</tbody></table>`;
  
  $g('priceTag').textContent=`≈ ${perPersonCny.toLocaleString()}元/人`;
  p.innerHTML=h;
}

// ===== 生成文档 =====
function genDoc(){
  const ppl=people(),rooms=Math.ceil(ppl/2),hs=hotelStar(),veh=vehicle(),peak=isPeak();
  const totalDays=dayData.length;
  
  if(totalDays===0){toast('请先配置行程');return}
  
  // Recalculate
  let dayCosts=[];
  let totals={vehicle:0,parking:0,guide:0,hotel:0,guideHotel:0,meals:0,tickets:0,driverMeal:0,custom:0};
  
  dayData.forEach((day,idx)=>{
    const mt=day.meals.mealType||'cn';
    const lunchPrice=mt==='cn'?PRICE.meal.lunch_cn:PRICE.meal.lunch_ru;
    const dinnerPrice=mt==='cn'?PRICE.meal.dinner_cn:(mt==='ru'?PRICE.meal.dinner_ru:PRICE.meal.dinner_cn);
    const vCost=PRICE.vehicle[veh]||2500;
    const hCost=PRICE.hotel[hs]||7000;
    const ghCost=PRICE.guideHotel[hs]||7500;
    const dhCost=PRICE.driverHotel[hs]||5500;
    const pm=peak?1.15:1;
    
    let v=day.vehicleHours*vCost*pm;
    let pk=day.parkingFee;
    let g=day.guideCost;
    let ho=(day.type!=='departure')?hCost*rooms:0;
    let gh=(day.type!=='departure')?ghCost+dhCost:0;
    if(day._extraHotels>0)gh+=hCost*day._extraHotels;
    let ml=(day.meals.lunch?lunchPrice*ppl:0)+(day.meals.dinner?dinnerPrice*ppl:0);
    let dm=(day.meals.lunch?PRICE.driverMeal:0)+(day.meals.dinner?PRICE.driverMeal:0);
    let tk=day.attractions.reduce((s,a)=>s+a.cost*ppl,0);
    let cu=day.customCost;
    let total=v+pk+g+ho+gh+ml+dm+tk+cu;
    
    dayCosts.push({day:day.day,idx,label:day.label,city:CITY_NAMES[day.city]||day.city,date:day.date,weekday:day.weekday,
      attractions:day.attractions,meals:day.meals,mealType:mt,
      vehicleHours:day.vehicleHours,type:day.type,customNote:day.customNote,
      vehicle:v,parking:pk,guide:g,hotel:ho,guideHotel:gh,meals:ml,driverMeal:dm,tickets:tk,custom:cu,total});
    
    totals.vehicle+=v;totals.parking+=pk;totals.guide+=g;totals.hotel+=ho;totals.guideHotel+=gh;
    totals.meals+=ml;totals.driverMeal+=dm;totals.tickets+=tk;totals.custom+=cu;
  });
  
  let trainCost=0,transferCost=0;
  const hasMoscow=selectedCities.includes('moscow');
  const hasSpb=selectedCities.includes('spb');
  if(hasMoscow&&hasSpb){
    const trips=dayData.some(d=>d.type==='transfer_out')?2:1;
    trainCost=PRICE.highspeed*ppl*trips;
  }
  dayData.forEach(d=>{if(['arrival','departure','transfer_in','transfer_out'].includes(d.type))transferCost+=PRICE.transfer});
  
  const grandTotal=totals.vehicle+totals.parking+totals.guide+totals.hotel+totals.guideHotel+totals.meals+totals.driverMeal+totals.tickets+totals.custom+trainCost+transferCost;
  const perP=Math.round(grandTotal/ppl);
  const perPCny=Math.round(perP/13);
  const totalCny=Math.round(grandTotal/13);
  
  const pName=$g('f_name').value;
  const client=$g('f_client').value;
  const depart=$g('f_depart').value;
  
  let doc='';
  
  // Header
  doc+=`═══════════════════════════════════════════════════════════════\n`;
  doc+=`          🇷🇺 阿杜俄旅 · 定制行程方案及报价单\n`;
  doc+=`═══════════════════════════════════════════════════════════════\n\n`;
  doc+=`  产品名称：${pName}\n`;
  doc+=`  客户类型：${CLIENT_NAMES[client]}\n`;
  doc+=`  出发城市：${depart}\n`;
  doc+=`  出行人数：${ppl}人 · ${rooms}间房\n`;
  doc+=`  住宿标准：${HOTEL_NAMES[hs]}\n`;
  doc+=`  用车标准：${VEHICLE_NAMES[veh]}\n`;
  doc+=`  ${peak?'🌞 旺季附加：已含15%上浮':'  旺季附加：无'}\n`;
  doc+=`  报价日期：${new Date().toLocaleDateString('zh-CN')}\n`;
  doc+=`  汇率参考：1元 ≈ 13₽\n\n`;
  
  doc+=`───────────────────────────────────────────────────────────────\n`;
  doc+=`  📋 详细行程\n`;
  doc+=`───────────────────────────────────────────────────────────────\n\n`;
  
  dayCosts.forEach(d=>{
    doc+=`  【第${d.day}天】${d.date} 周${d.weekday}  ${d.city}\n`;
    doc+=`  ───────────────────────────────────────────\n`;
    doc+=`  主题：${d.label}\n`;
    
    if(d.type==='arrival'){
      doc+=`  ✈️ 抵达${d.city}，中文导游举牌接机\n`;
      doc+=`  🏨 入住${HOTEL_NAMES[hs]}酒店，调整休息\n`;
    }
    if(d.type==='departure'){
      doc+=`  ✈️ 送机返程，结束愉快的俄罗斯之旅！\n`;
    }
    if(d.type==='transfer_in'&&d.city==='圣彼得堡'){
      doc+=`  🚄 乘坐高铁「游隼号」赴圣彼得堡（约4小时）\n`;
    }
    if(d.type==='transfer_out'&&d.city==='莫斯科'){
      doc+=`  🚄 乘坐高铁「游隼号」返回莫斯科（约4小时）\n`;
    }
    
    if(d.attractions.length>0){
      doc+=`  🎯 游览景点：\n`;
      d.attractions.forEach(a=>{doc+=`    · ${a.name}${a.cost>0?` (${a.cost}₽/人)`:''}\n`});
    }
    
    doc+=`  🍽️ 用餐：${d.meals.breakfast?'早餐✓ ':''}${d.meals.lunch?'午餐✓('+(d.mealType==='cn'?'中餐':'俄餐')+') ':''}${d.meals.dinner?'晚餐✓('+(d.mealType==='cn'?'中餐':'俄餐')+') ':''}\n`;
    doc+=`  🚐 用车：${d.vehicleHours}小时\n`;
    if(d.customNote)doc+=`  📌 备注：${d.customNote}\n`;
    doc+=`\n`;
  });
  
  // Price table
  doc+=`───────────────────────────────────────────────────────────────\n`;
  doc+=`  💰 报价明细\n`;
  doc+=`───────────────────────────────────────────────────────────────\n\n`;
  
  // Simple formatted table
  const items=[
    ['🚐 用车(含停车+司机餐)',(totals.vehicle+totals.parking+totals.driverMeal).toLocaleString(),Math.round((totals.vehicle+totals.parking+totals.driverMeal)/ppl).toLocaleString(),'≈'+Math.round((totals.vehicle+totals.parking+totals.driverMeal)/13).toLocaleString()+'元'],
    ['👤 中文导游服务',totals.guide.toLocaleString(),Math.round(totals.guide/ppl).toLocaleString(),'≈'+Math.round(totals.guide/13).toLocaleString()+'元'],
    ['🏨 住宿(含导游/司机)',(totals.hotel+totals.guideHotel).toLocaleString(),Math.round((totals.hotel+totals.guideHotel)/ppl).toLocaleString(),'≈'+Math.round((totals.hotel+totals.guideHotel)/13).toLocaleString()+'元'],
    ['🍽️ 餐费',totals.meals.toLocaleString(),Math.round(totals.meals/ppl).toLocaleString(),'≈'+Math.round(totals.meals/13).toLocaleString()+'元'],
    ['🎫 景点门票',totals.tickets.toLocaleString(),Math.round(totals.tickets/ppl).toLocaleString(),'≈'+Math.round(totals.tickets/13).toLocaleString()+'元'],
  ];
  if(trainCost>0)items.push(['🚄 高铁莫斯科↔彼得堡',trainCost.toLocaleString(),Math.round(trainCost/ppl).toLocaleString(),'≈'+Math.round(trainCost/13).toLocaleString()+'元']);
  if(transferCost>0)items.push(['🚐 接送机/站',transferCost.toLocaleString(),Math.round(transferCost/ppl).toLocaleString(),'≈'+Math.round(transferCost/13).toLocaleString()+'元']);
  if(totals.custom>0)items.push(['📌 其他附加',totals.custom.toLocaleString(),Math.round(totals.custom/ppl).toLocaleString(),'≈'+Math.round(totals.custom/13).toLocaleString()+'元']);
  
  items.forEach(([n,v1,v2,v3])=>{doc+=`  ${n.padEnd(22)} ${v1.padStart(12)}  ${v2.padStart(10)}  ${v3}\n`});
  doc+=`  ───────────────────────────────────────────────────────────\n`;
  doc+=`  ★ 总计                ${grandTotal.toLocaleString().padStart(12)}  ${perP.toLocaleString().padStart(10)}  ≈${totalCny.toLocaleString()}元\n`;
  doc+=`  ★ 人均                ${perP.toLocaleString().padStart(12)}₽                    ≈${perPCny.toLocaleString()}元\n\n`;
  
  // Includes/Excludes
  doc+=`───────────────────────────────────────────────────────────────\n`;
  doc+=`  ✅ 费用包含\n`;
  doc+=`───────────────────────────────────────────────────────────────\n`;
  doc+=`  · 全程中文导游服务\n`;
  doc+=`  · ${VEHICLE_NAMES[veh]}用车(含司机、油费、停车费${peak?'、旺季15%附加':''})\n`;
  doc+=`  · ${HOTEL_NAMES[hs]}酒店住宿${dayData.filter(d=>d.type!=='departure').length}晚（含早餐）\n`;
  doc+=`  · 行程所列景点首道门票\n`;
  doc+=`  · 行程所列餐食\n`;
  if(trainCost>0)doc+=`  · 莫斯科↔圣彼得堡高铁「游隼号」${dayData.some(d=>d.type==='transfer_out')?'往返':'单程'}二等座\n`;
  doc+=`  · 机场/车站接送\n\n`;
  
  doc+=`───────────────────────────────────────────────────────────────\n`;
  doc+=`  ❌ 费用不含\n`;
  doc+=`───────────────────────────────────────────────────────────────\n`;
  doc+=`  · 中国↔俄罗斯国际机票（可代查价格）\n`;
  doc+=`  · 俄罗斯签证费用（电子签约2,000-3,000元，可代办）\n`;
  doc+=`  · 旅游意外保险（建议购买，约50-100元/人）\n`;
  doc+=`  · 马林斯基剧院等演出票（如需代订请提前告知）\n`;
  doc+=`  · 个人消费、纪念品、酒水饮料\n`;
  doc+=`  · 司机导游小费（建议每人每日500₽，约38元）\n`;
  doc+=`  · 不可抗力因素产生的额外费用\n\n`;
  
  doc+=`───────────────────────────────────────────────────────────────\n`;
  doc+=`  📌 温馨提示\n`;
  doc+=`───────────────────────────────────────────────────────────────\n`;
  doc+=`  1. 以上报价基于实时汇率，实际价格以预订时为准\n`;
  doc+=`  2. 各博物馆有固定休息日，最终行程根据实际开放日微调\n`;
  doc+=`  3. 旺季(7-8月)酒店价格上浮20-30%，建议尽早确认预订\n`;
  doc+=`  4. 如对用车天数、餐食标准、住宿等级有调整，报价可灵活调整\n`;
  doc+=`  5. 如需俄罗斯国旅正式报价单（俄方地接社），可另行出具\n`;
  doc+=`  6. 电子签证（E-visa）最快4天出签，停留16天以内适用\n\n`;
  
  doc+=`═══════════════════════════════════════════════════════════════\n`;
  doc+=`  🏢 阿杜俄旅 · 俄罗斯导游阿杜\n`;
  doc+=`  从业二十年资深中文导游 · 专业俄罗斯地接服务\n`;
  doc+=`  📞 微信/电话咨询 · 欢迎随时沟通\n`;
  doc+=`═══════════════════════════════════════════════════════════════\n`;
  
  const box=$g('outputBox');
  box.textContent=doc;
  box.classList.add('open');
  box.scrollIntoView({behavior:'smooth'});
  toast('✅ 行程单+报价单已生成');
  
  // Also offer download
  const blob=new Blob([doc],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${pName}_行程报价_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
}

// ===== 保存/载入 =====
function saveToFile(){
  const state={selectedCities,dayData,f_name:$g('f_name').value,f_client:$g('f_client').value,
    f_people:$g('f_people').value,f_days:$g('f_days').value,f_depart:$g('f_depart').value,
    f_hotel:$g('f_hotel').value,f_vehicle:$g('f_vehicle').value,f_peak:$g('f_peak').value};
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`俄旅方案_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('✅ 方案已保存');
}

function loadFromFile(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='.json';
  input.onchange=async(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    const text=await file.text();
    try{
      const state=JSON.parse(text);
      if(state.selectedCities)selectedCities=state.selectedCities;
      if(state.dayData)dayData=state.dayData;
      if(state.f_name)$g('f_name').value=state.f_name;
      if(state.f_client)$g('f_client').value=state.f_client;
      if(state.f_people)$g('f_people').value=state.f_people;
      if(state.f_days)$g('f_days').value=state.f_days;
      if(state.f_depart)$g('f_depart').value=state.f_depart;
      if(state.f_hotel)$g('f_hotel').value=state.f_hotel;
      if(state.f_vehicle)$g('f_vehicle').value=state.f_vehicle;
      if(state.f_peak)$g('f_peak').value=state.f_peak;
      initCities();
      renderDays();
      calcPrice();
      toast('✅ 方案已载入');
    }catch(e){toast('❌ 文件格式错误');}
  };
  input.click();
}

function resetAll(){
  if(!confirm('确定重置所有数据吗？'))return;
  dayData=[];selectedCities=['moscow','spb'];
  $g('f_name').value='莫斯科+圣彼得堡';
  $g('f_client').value='family';
  $g('f_people').value='5';
  $g('f_days').value='9';
  $g('f_hotel').value='4';
  $g('f_vehicle').value='minibus';
  $g('f_peak').value='0';
  $g('outputBox').classList.remove('open');
  initCities();
  rebuildAll();
  toast('🔄 已重置');
}

function toast(msg){
  const t=$g('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ===== 初始化 =====
document.addEventListener('DOMContentLoaded',()=>{
  selectedCities=['moscow','spb'];
  initCities();
  rebuildAll();
});
</script>
