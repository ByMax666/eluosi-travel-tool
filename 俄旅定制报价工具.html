<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿杜俄旅 · 定制报价 · 0.32</title>
<style>
:root {
  --p: #A93226; --p2: #7B1818; --p3: #FDF0ED;
  --g: #C8A84E; --g2: #F5EDD6;
  --bg: #F7F3EE; --card: #FFFFFF; --text: #1A1A1A; --text2: #6B5E55;
  --border: #E2D9D0; --border2: #F0EBE6;
  --s: #27AE60; --w: #E67E22;
  --sh: 0 2px 8px rgba(0,0,0,.06);
  --sh-lg: 0 8px 30px rgba(0,0,0,.08);
  --r: 12px; --r-sm: 8px;
  --font: 'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,"Microsoft YaHei",sans-serif;
  --font-display: 'Playfair Display',Georgia,serif;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;padding:0}

/* ===== TOP BAR ===== */
.topbar{background:var(--p2);color:#fff;padding:10px 0;font-size:12px;border-bottom:3px solid var(--g)}
.topbar-inner{max-width:1400px;margin:0 auto;padding:0 32px;display:flex;justify-content:space-between;align-items:center}
.topbar-inner span{opacity:.85}

/* ===== HEADER ===== */
.hdr{background:linear-gradient(135deg,var(--p2),var(--p));color:#fff;padding:40px 0 36px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(255,255,255,.05) 0%,transparent 60%);border-radius:50%}
.hdr::after{content:'\1F1F7\1F1FA';position:absolute;right:48px;top:35px;font-size:72px;opacity:.08;pointer-events:none}
.hdr-inner{max-width:1400px;margin:0 auto;padding:0 32px;position:relative;z-index:1}
.hdr h1{font-family:var(--font-display);font-size:34px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px}
.hdr p{font-size:15px;opacity:.8;font-weight:400}
.hdr .badge{display:inline-block;background:var(--g);color:var(--p2);padding:3px 14px;border-radius:12px;font-size:11px;font-weight:700;margin-bottom:12px;letter-spacing:1px}

/* ===== MAIN LAYOUT ===== */
.c{max-width:1440px;margin:0 auto;padding:0 32px}
.l-main{display:grid;grid-template-columns:1fr 400px;gap:28px;align-items:start}
.l-main-wide{grid-column:1/-1}

/* ===== SIDEBAR ===== */
.sidebar{position:sticky;top:20px}
.sidebar .card:first-child{margin-top:0}

/* ===== CARDS ===== */
.card{background:var(--card);border-radius:var(--r);padding:28px 32px;margin-bottom:24px;box-shadow:var(--sh);border:1px solid var(--border2);transition:box-shadow .2s}
.card-accent{border-left:4px solid var(--p)}
.card h2{font-family:var(--font-display);font-size:17px;color:var(--p);margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--p3);display:flex;align-items:center;gap:10px;letter-spacing:-.2px}
.card h2 .step{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--p);color:#fff;font-size:12px;font-weight:700;font-family:var(--font)}
.section-title{font-family:var(--font-display);font-size:16px;color:var(--p);margin:20px 0 12px}

/* ===== FORM ===== */
.fr{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:14px}
.fg{flex:1;min-width:170px}
.fg label{display:block;font-size:11px;font-weight:600;margin-bottom:4px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px}
.fg input,.fg select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;background:#fff;transition:border-color .2s,box-shadow .2s;color:var(--text);font-family:var(--font)}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(169,50,38,.1)}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;min-height:40px;font-family:var(--font);letter-spacing:.3px}
.btn-p{background:linear-gradient(135deg,var(--p2),var(--p));color:#fff;box-shadow:0 2px 12px rgba(169,50,38,.25)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(169,50,38,.35)}
.btn-s{background:linear-gradient(135deg,#219a52,#27ae60);color:#fff;box-shadow:0 2px 12px rgba(39,174,96,.25)}
.btn-s:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(39,174,96,.35)}
.btn-o{background:transparent;color:var(--p);border:1.5px solid var(--p)}.btn-o:hover{background:var(--p3)}
.btn-d{background:#e74c3c;color:#fff}.btn-d:hover{background:#c0392b}
.btn-sm{padding:7px 14px;font-size:11px;min-height:32px}
.btn-xs{padding:4px 10px;font-size:10px;border-radius:5px;min-height:26px}
.bg{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;justify-content:center}

/* ===== CITY SELECTOR ===== */
.city-pool{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.city-chip{padding:7px 18px;border-radius:20px;font-size:12px;cursor:pointer;border:1.5px solid var(--border);transition:all .2s;background:#fff;user-select:none;min-height:34px;display:flex;align-items:center;gap:6px;font-weight:600}
.city-chip:hover{border-color:var(--p);background:var(--p3);transform:translateY(-1px)}
.city-chip.used{background:var(--p);color:#fff;border-color:var(--p);box-shadow:0 2px 8px rgba(169,50,38,.2)}
.city-order{display:flex;flex-direction:column;gap:6px;margin:8px 0}
.city-order-item{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--p3);border-radius:var(--r-sm);border:1px solid var(--border2);transition:all .2s}
.city-order-item:hover{border-color:var(--p)}
.city-order-item .order-num{font-weight:700;color:var(--p);min-width:24px;font-size:13px}
.city-order-item .city-name{flex:1;font-size:13px;font-weight:600}
.city-order-item .day-ctrl{display:flex;align-items:center;gap:4px}
.city-order-item .day-ctrl input{width:40px;text-align:center;padding:4px;border:1.5px solid var(--border);border-radius:5px;font-size:12px;font-weight:700}
.city-order-item .move-btn{cursor:pointer;padding:4px 6px;border-radius:4px;color:var(--text2);font-size:14px}.city-order-item .move-btn:hover{background:var(--p);color:#fff}
.city-order-item .del-btn{cursor:pointer;color:#e74c3c;font-size:18px;padding:4px;opacity:.5}.city-order-item .del-btn:hover{opacity:1}

/* ===== TIMELINE DAYS ===== */
.day-list{display:flex;flex-direction:column;gap:0;position:relative}
.day-list::before{content:'';position:absolute;left:44px;top:12px;bottom:12px;width:2px;background:var(--border);z-index:0}
.day-card{position:relative;padding-left:72px;padding-bottom:16px;z-index:1}
.day-card::before{content:'';position:absolute;left:37px;top:18px;width:16px;height:16px;border-radius:50%;background:var(--p);border:3px solid var(--p3);z-index:2;transition:transform .2s}
.day-card:hover::before{transform:scale(1.2);background:var(--p2)}
.day-card:last-child{padding-bottom:0}
.day-card-inner{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;transition:box-shadow .2s;box-shadow:var(--sh)}
.day-card-inner:hover{box-shadow:var(--sh-lg)}
.day-hdr{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;user-select:none;background:var(--p3);min-height:48px;transition:background .15s}
.day-hdr:hover{background:#F5E5E0}
.day-hdr .dd-num{font-weight:700;color:var(--p);min-width:54px;font-size:14px;font-family:var(--font-display)}
.day-hdr .dd-city{font-size:12px;color:var(--text2);min-width:70px;font-weight:600}
.day-hdr .dd-theme{flex:1;font-size:13px;font-weight:500}
.day-hdr .dd-ctrl{display:flex;gap:3px}
.day-hdr .dd-toggle{font-size:11px;color:#bbb;margin-left:6px}
.day-body{padding:20px;display:none;border-top:1px solid var(--border2)}
.day-body.open{display:block}
.dr{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.dr .df{flex:1;min-width:120px}
.dr .df label{font-size:10px;color:var(--text2);display:block;margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.dr .df input,.dr .df select{width:100%;padding:6px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;background:#fff}

/* ===== ATTRACTIONS ===== */
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:3px;margin:8px 0}
.ai{display:flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;border-radius:6px;cursor:pointer;min-height:30px;transition:background .15s}
.ai:hover{background:var(--p3)}
.ai input{accent-color:var(--p);width:15px;height:15px;cursor:pointer}
.ap{font-size:10px;color:#aaa;margin-left:auto}
.ab{font-size:9px;padding:1px 5px;border-radius:3px;background:#F0EBE6;color:var(--text2)}
.st{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
.st .tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:rgba(169,50,38,.1);color:var(--p);border-radius:12px;font-size:11px;font-weight:500}
.st .tag .del{cursor:pointer;font-size:12px;color:#999;margin-left:3px}.st .tag .del:hover{color:#e74c3c}
.mr{display:flex;gap:14px;flex-wrap:wrap;margin:8px 0;align-items:center}
.mr label{font-size:12px;display:flex;align-items:center;gap:4px;min-height:26px}
.mr select{font-size:11px;padding:3px 6px;border:1.5px solid var(--border);border-radius:4px}

/* ===== TABLES ===== */
.tb-wrap{overflow-x:auto;margin:10px 0;border:1px solid var(--border2);border-radius:var(--r-sm);background:#fff}
.qt{width:100%;border-collapse:collapse;font-size:13px}
.qt th,.qt td{padding:10px 14px;text-align:right;border-bottom:1px solid var(--border2)}
.qt th{background:var(--p3);text-align:center;font-weight:600;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.qt td:first-child{text-align:left;font-weight:500}
.qt tr:last-child td{border-bottom:none}
.qt tr:hover td{background:var(--p3)}
.qt .trt{background:#F5E5E0!important;font-weight:700;font-size:14px;color:var(--p)}
.qt .trt td{border-top:2px solid var(--p)}

/* ===== SIDEBAR PRICE ===== */
.price-card{text-align:center;padding:20px}
.price-card .big-num{font-family:var(--font-display);font-size:42px;color:var(--p);font-weight:700;line-height:1}
.price-card .big-num span{font-size:16px;font-weight:400;color:var(--text2)}
.price-card .per-person{font-size:13px;color:var(--text2);margin-top:6px}
.price-divider{height:1px;background:var(--border2);margin:12px 0}
.price-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;color:var(--text2)}
.price-row .val{font-weight:600;color:var(--text)}

/* ===== OUTPUT ===== */
.ob{margin-top:16px;padding:24px 28px;background:#1A1A1A;color:#E8E0D8;border-radius:var(--r);display:none;font-size:13px;line-height:1.8;max-height:600px;overflow-y:auto;white-space:pre-wrap;font-family:'Cascadia Code','Fira Code',Menlo,monospace}
.ob.open{display:block}

/* ===== CHAT ===== */
.chat-t{position:fixed;bottom:28px;right:28px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--p2),var(--p));color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(169,50,38,.35);z-index:1000;display:flex;align-items:center;justify-content:center;transition:transform .2s}
.chat-t:hover{transform:scale(1.1) rotate(5deg)}
.chat-p{position:fixed;bottom:92px;right:28px;width:420px;height:600px;background:#fff;border-radius:var(--r);box-shadow:0 12px 48px rgba(0,0,0,.15);z-index:999;display:none;flex-direction:column;overflow:hidden;border:1px solid var(--border)}
.chat-p.on{display:flex}
.chat-h{background:linear-gradient(135deg,var(--p2),var(--p));color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px}
.chat-h .av{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:20px}
.chat-h .info{flex:1}.chat-h .info h3{font-size:14px;font-weight:700}.chat-h .info p{font-size:10px;opacity:.8}
.chat-h .cb{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px}
.chat-m{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:var(--bg)}
.chat-msg{max-width:88%;padding:10px 16px;border-radius:14px;font-size:13px;line-height:1.6;animation:mi .3s ease}
@keyframes mi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.chat-u{background:var(--p);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-a{background:var(--card);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.chat-i{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);background:#fff}
.chat-i textarea{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;resize:none;height:40px;line-height:1.4;font-family:var(--font)}
.chat-i textarea:focus{outline:none;border-color:var(--p)}
.chat-i .sb{width:40px;height:40px;border-radius:50%;border:none;background:var(--p);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-i .sb:disabled{background:#ccc;cursor:not-allowed}
.chat-bar{display:flex;align-items:center;gap:6px;padding:8px 14px;border-bottom:1px solid var(--border2);background:var(--p3)}
.chat-bar input{padding:5px 10px;border:1.5px solid var(--border);border-radius:5px;font-size:11px}
.chat-bar input:focus{outline:none;border-color:var(--p)}
.chat-bar .cb-btn{padding:4px 12px;border:none;border-radius:4px;font-size:10px;cursor:pointer;font-weight:600}
.chat-bar .cb-btn.p{background:var(--p);color:#fff}.chat-bar .cb-btn.p:hover{background:var(--p2)}
.chat-bar .cb-btn.d{border:1px solid #e74c3c;color:#e74c3c;background:transparent}
.chat-bar .st{font-size:10px;color:var(--text2)}.chat-bar .st.ok{color:var(--s);font-weight:600}
.ct{display:flex;gap:4px;padding:10px 16px;align-items:center;align-self:flex-start;background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.ct .d{width:7px;height:7px;border-radius:50%;background:#ccc;animation:dp 1.2s infinite}
.ct .d:nth-child(2){animation-delay:.2s}.ct .d:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,60%,100%{transform:scale(1);opacity:.4}30%{transform:scale(1.3);opacity:1}}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 28px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center}
.toast.show{opacity:1}

/* ===== DAY COST BADGE ===== */
.day-cost{font-size:12px;color:var(--p);font-weight:600;background:var(--p3);padding:2px 10px;border-radius:10px;margin-left:auto}

/* ===== RESPONSIVE ===== */
@media(max-width:1100px){.l-main{grid-template-columns:1fr}.sidebar{position:static}}
@media print{.no-print{display:none!important}body{background:#fff}.card{box-shadow:none;border:1px solid #ddd;break-inside:avoid}.hdr{background:var(--p2)!important;-webkit-print-color-adjust:exact}.ob{background:#fff!important;color:var(--text)!important}}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container" id="app">
<div class="header no-print">
<h1>🇷🇺 阿杜俄旅 · 产品定制与报价核算</h1>
<p>俄罗斯旅游产品定制工具 · 实时成本核算 · 一键生成行程单+报价单</p>
</div>

<!-- ===== 第1步：基础信息 ===== -->
<div class="card no-print">
<h2>📋 ① 基础信息</h2>
<div class="form-row">
<div class="form-group"><label>产品名称</label><input type="text" id="f_name" value="莫斯科+圣彼得堡"></div>
<div class="form-group"><label>客户类型</label>
<select id="f_client"><option value="family">家庭团</option><option value="group">常规团</option><option value="vip">VIP精品团</option></select></div>
<div class="form-group"><label>出行人数</label><input type="number" id="f_people" value="5" min="1" max="50" onchange="onParamChange()"></div>
<div class="form-group"><label>行程天数（含首尾）</label><input type="number" id="f_days" value="9" min="2" max="30" onchange="onParamChange()"></div>
</div>
<div class="form-row">
<div class="form-group"><label>出发城市</label>
<select id="f_depart"><option>北京</option><option>上海</option><option>广州</option><option>深圳</option><option>成都</option><option>香港</option></select></div>
<div class="form-group"><label>住宿标准</label>
<select id="f_hotel" onchange="onParamChange()">
<option value="3">★★★ 三星</option><option value="4" selected>★★★★ 四星</option><option value="5">★★★★★ 五星</option>
</select></div>
<div class="form-group"><label>用车类型</label>
<select id="f_vehicle" onchange="onParamChange()">
<option value="minibus">中巴(18座 舒适≤15人)</option>
<option value="bus">大巴(35-40座)</option>
<option value="sedan">轿车/商务(1-4人)</option>
</select></div>
<div class="form-group"><label>是否旺季</label>
<select id="f_peak" onchange="onParamChange()">
<option value="0">平季</option><option value="1">旺季(7-8月,+15%)</option>
</select></div>
</div>
</div>

<!-- ===== 第2步：选择城市 ===== -->
<div class="card no-print">
<h2>🏙️ ② 选择游览城市</h2>
<div class="city-grid" id="cityGrid"></div>
<div id="cityDayAlloc" style="display:none;margin-top:10px;padding:12px;background:#f8f4f0;border-radius:10px;">
<div style="font-size:13px;font-weight:600;margin-bottom:8px;">分配各城市天数 <span id="cityDayTotal" style="font-weight:400;color:#888;font-size:12px;">(共0天)</span></div>
<div class="form-row" id="cityDayInputs"></div>
<div id="cityDayTip" style="font-size:12px;margin-top:6px;"></div>
</div>
</div>

<!-- ===== 第3步：每日行程 ===== -->
<div class="card no-print">
<h2>📅 ③ 每日行程编辑 <span id="dayCount" style="font-weight:400;font-size:13px;color:#888;"></span></h2>
<div id="dayEditor"><p style="color:#999;text-align:center;padding:20px;">请先选择城市，系统自动生成行程框架</p></div>
</div>

<!-- ===== 第4步：报价核算 ===== -->
<div class="card no-print">
<h2>💰 ④ 实时报价核算 <span id="priceTag" style="font-weight:400;font-size:13px;color:#888;"></span></h2>
<div id="priceSummary"><p style="color:#999;text-align:center;padding:16px;">配置行程后自动核算</p></div>
</div>

<!-- ===== 操作按钮 ===== -->
<div class="btn-group no-print" style="justify-content:center;margin:20px 0;">
<button class="btn btn-success" onclick="genDoc()">📄 生成行程单+报价单</button>
<button class="btn btn-primary" onclick="window.print()">🖨️ 打印/PDF</button>
<button class="btn btn-outline" onclick="saveToFile()">💾 保存方案</button>
<button class="btn btn-outline" onclick="loadFromFile()">📂 载入方案</button>
<button class="btn btn-danger" onclick="resetAll()">🔄 重置</button>
</div>

<!-- ===== 文档输出 ===== -->
<div class="output-box" id="outputBox"></div>
</div>

<div id="toast" class="toast"></div>

<script>
// ===== 全局定价参数 (基于实际成本核算) =====
const PRICE = {
  vehicle: { bus:3510, minibus:2500, sedan:1800 },
  // Hotel: per ROOM per night (双床标间)
  hotel: { 3:5000, 4:7000, 5:12000 },
  guideHotel: { 3:5000, 4:7500, 5:12000 },
  driverHotel: { 3:3500, 4:5500, 5:8000 },
  // Guide: 全天30000, 半日(接送)15000
  guideFull: 30000,
  guideHalf: 15000,
  // Meals per person: 中餐
  meal: { lunch_cn:2300, dinner_cn:2300, lunch_ru:1400, dinner_ru:1200 },
  // Driver meal per meal
  driverMeal: 1500,
  // Parking per day
  parking: 2500,
  // Transfer (airport/station pickup/drop)
  transfer: 13000,
  // Train
  highspeed: 6000,
};

// ===== 读取表单值 =====
function $g(id){return document.getElementById(id)}

function guideHotel(){return PRICE.guideHotel[hotelStar()]}
function driverHotel(){return PRICE.driverHotel[hotelStar()]}

// ===== 城市选择 =====
function initCities(){
  const g=$g('cityGrid');
  g.innerHTML=Object.entries(CITY_NAMES).map(([k,v])=>
    `<div class="city-chip${selectedCities.includes(k)?' selected':''}" data-city="${k}" onclick="toggleCity('${k}')">
      <input type="checkbox" ${selectedCities.includes(k)?'checked':''}>
      <span>${v}</span>
    </div>`
  ).join('');
  updateCityAlloc();
}

function toggleCity(city){
  const idx=selectedCities.indexOf(city);
  if(idx>=0) selectedCities.splice(idx,1);
  else selectedCities.push(city);
  initCities();
  rebuildAll();
}

function updateCityAlloc(){
  const alloc=$g('cityDayAlloc');
  const inputs=$g('cityDayInputs');
  const total=days();
  if(selectedCities.length<2){alloc.style.display='none';return}
  alloc.style.display='block';
  $g('cityDayTotal').textContent=`(共${total}天)`;
  let html='';
  selectedCities.forEach((c,i)=>{
    const existing=$g('cd_'+c);
    const val=existing?parseInt(existing.value)||0:Math.floor(total/selectedCities.length);
    html+=`<div class="form-group" style="min-width:120px;">
      <label>${CITY_NAMES[c]}</label>
      <div class="city-day-input">
        <input type="number" id="cd_${c}" value="${val}" min="1" max="20" onchange="onCityDayChange()">
        <span style="font-size:11px;color:#888;">天</span>
      </div>
    </div>`;
  });
  inputs.innerHTML=html;
  validateCityDays();
}

function onCityDayChange(){validateCityDays();rebuildAll()}

function validateCityDays(){
  let sum=0;
  selectedCities.forEach(c=>{sum+=parseInt(($g('cd_'+c)||{value:0}).value)||0});
  const tip=$g('cityDayTip');
  const total=days();
  if(sum===total){tip.style.color='#27ae60';tip.textContent='✅ 天数分配正确';return true}
  else{tip.style.color='#e74c3c';tip.textContent='❌ 当前合计'+sum+'天，应为'+total+'天';return false}
}

function getCityDays(city){return parseInt(($g('cd_'+city)||{value:0}).value)||0}

}

function rebuildAll(){
  buildDays();

}

// ===== 构建行程框架 =====
function buildDays(){
  const total=days();
  if(selectedCities.length===0){dayData=[];renderDays();calcPrice();return}
  
  // Simplified logic: just create sequential days
  // First determine the sequence of cities per day
  let seq=[];
  let remaining=total;
  
  if(selectedCities.includes('moscow')&&selectedCities.includes('spb')){
    // Complex route: Moscow -> others -> SPB -> Moscow
    let md=getCityDays('moscow');
    let sd=getCityDays('spb');
    let others=selectedCities.filter(c=>c!=='moscow'&&c!=='spb');
    
    seq.push({city:'moscow',type:'arrival',label:'抵达莫斯科'});
    for(let i=1;i<md-1&&seq.length<total-1;i++)seq.push({city:'moscow',type:'sightseeing',label:'莫斯科游览'});
    
    others.forEach(c=>{
      let cd=getCityDays(c);
      if(seq.length<total-1){
        seq.push({city:c,type:'sightseeing',label:CITY_NAMES[c]+'游览'});
        for(let i=1;i<cd&&seq.length<total-1;i++)seq.push({city:c,type:'sightseeing',label:CITY_NAMES[c]+'游览'});
      }
    });
    
    if(seq.length<total-1){
      seq.push({city:'spb',type:'transfer_in',label:'🚄 高铁赴圣彼得堡'});
      for(let i=1;i<sd-1&&seq.length<total-1;i++)seq.push({city:'spb',type:'sightseeing',label:'圣彼得堡游览'});
    }
    seq.push({city:'spb',type:'departure',label:'送机/送站返程'});
  }
  else if(selectedCities.includes('moscow')&&selectedCities.includes('tula')){
    let md=getCityDays('moscow');
    let td=getCityDays('tula');
    let others=selectedCities.filter(c=>c!=='moscow'&&c!=='tula');
    
    seq.push({city:'moscow',type:'arrival',label:'抵达莫斯科'});
    for(let i=1;i<md-1&&seq.length<total-2;i++)seq.push({city:'moscow',type:'sightseeing',label:'莫斯科游览'});
    
    others.forEach(c=>{
      if(seq.length<total-2){seq.push({city:c,type:'sightseeing',label:CITY_NAMES[c]+'游览'});}
    });
    
    seq.push({city:'tula',type:'sightseeing',label:'图拉游览'});
    seq.push({city:'moscow',type:'departure',label:'送机返程'});
  }
  else {
    // Simple: all days in first city
    const mc=selectedCities[0];
    seq.push({city:mc,type:'arrival',label:'抵达'+CITY_NAMES[mc]});
    for(let i=1;i<total-1;i++)seq.push({city:mc,type:'sightseeing',label:CITY_NAMES[mc]+'游览'});
    seq.push({city:mc,type:'departure',label:'送机返程'});
  }
  
  // Trim/pad to match total
  while(seq.length>total)seq.pop();
  while(seq.length<total)seq.push({city:selectedCities[0]||'moscow',type:'sightseeing',label:'自由活动'});
  
  // Build dayData objects, preserving existing data where possible
  const oldData=dayData;
  dayData=seq.map((item,idx)=>{
    const old=oldData[idx]||{};
    const d=new Date(2026,6,11+idx);
    return {
      day:idx+1,
      date:(d.getMonth()+1)+'/'+d.getDate(),
      weekday:WEEKDAYS[d.getDay()],
      city:item.city,
      type:item.type,
      label:old.label||item.label,
      attractions:old.attractions||[],
      meals:old.meals||{breakfast:true,lunch:true,dinner:false,mealType:'cn'},
      vehicleHours:old.vehicleHours||(item.type==='arrival'||item.type==='departure'?4:item.type==='sightseeing'?10:6),
      parkingFee:old.parkingFee||2500,
      guideCost:old.guideCost||(item.type==='arrival'||item.type==='departure'?PRICE.guideHalf:PRICE.guideFull),
      customCost:old.customCost||0,
      customNote:old.customNote||'',
      _extraHotels:old._extraHotels||0,
    };
  });
}

function escHtml(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function toggleAttr(di,aid,aname,acost){

  const ei=day.attractions.findIndex(a=>a.id===aid);
  if(ei>=0)day.attractions.splice(ei,1);
  else day.attractions.push({id:aid,name:aname,cost:acost});

  calcPrice();
}
function removeAttr(di,aid){
  dayData[di].attractions=dayData[di].attractions.filter(a=>a.id!==aid);
  refreshAttrs(di);
  // Uncheck checkbox
  calcPrice();
}
function refreshAttrs(di){
  const c=$g('sa_'+di);
  if(!c)return;
  c.innerHTML=dayData[di].attractions.map(a=>
    `<span class="tag">${a.name} ${a.cost>0?a.cost+'₽':''}<span class="del" onclick="removeAttr(${di},'${a.id}')">✕</span></span>`
  ).join('');
}

// ===== 计算报价 =====
function calcPrice(){
  const ppl=people(),peak=peakMul(),vCost=vehCost(),hCost=hotelCost(),ghCost=guideHotel(),dhCost=driverHotel();
  const p=$g('priceSummary');
  
  if(dayData.length===0){p.innerHTML='<p style="color:#999;text-align:center;padding:16px;">请先配置行程</p>';return}
  
  // Calculate rooms needed: for family double rooms
  let rooms=Math.ceil(ppl/2);
  if(rooms<1)rooms=1;
  
  // Build per-day costs
  let dayCosts=[];
  let totals={vehicle:0,parking:0,guide:0,hotel:0,guideHotel:0,meals:0,tickets:0,driverMeal:0,custom:0};
  
  dayData.forEach((day,idx)=>{
    const mt=day.meals.mealType||'cn';
    const lunchPrice=mt==='cn'?PRICE.meal.lunch_cn:PRICE.meal.lunch_ru;
    const dinnerPrice=mt==='cn'?PRICE.meal.dinner_cn:(mt==='ru'?PRICE.meal.dinner_ru:PRICE.meal.dinner_cn);
    // mixed: lunch ru, dinner cn
    
    let v=day.vehicleHours*vCost*peak;
    let pk=day.parkingFee;
    let g=day.guideCost;
    let ho=(day.type!=='departure')?hCost*rooms:0;
    let gh=(day.type!=='departure')?ghCost+dhCost:0; // guide + driver hotel
    // If user set extra rooms
    if(day._extraHotels>0)gh+=hCost*day._extraHotels;
    
    let ml=(day.meals.lunch?lunchPrice*ppl:0)+(day.meals.dinner?dinnerPrice*ppl:0);
    let dm=(day.meals.lunch?PRICE.driverMeal:0)+(day.meals.dinner?PRICE.driverMeal:0);
    let tk=day.attractions.reduce((s,a)=>s+a.cost*ppl,0);
    let cu=day.customCost;
    
    let total=v+pk+g+ho+gh+ml+dm+tk+cu;
    dayCosts.push({day:day.day,label:day.label,city:CITY_NAMES[day.city]||day.city,
      vehicle:v,parking:pk,guide:g,hotel:ho,guideHotel:gh,meals:ml,driverMeal:dm,tickets:tk,custom:cu,total});
    
    totals.vehicle+=v; totals.parking+=pk; totals.guide+=g; totals.hotel+=ho; totals.guideHotel+=gh;
    totals.meals+=ml; totals.driverMeal+=dm; totals.tickets+=tk; totals.custom+=cu;
  });
  
  // High speed train
  let trainCost=0;
  const hasMoscow=selectedCities.includes('moscow');
  const hasSpb=selectedCities.includes('spb');
  if(hasMoscow&&hasSpb){
    const trips=dayData.some(d=>d.type==='transfer_out')?2:1;
    trainCost=PRICE.highspeed*ppl*trips;
  }
  
  // Transfers
  let transferCost=0;
  dayData.forEach(d=>{if(['arrival','departure','transfer_in','transfer_out'].includes(d.type))transferCost+=PRICE.transfer});
  
  const grandTotal=totals.vehicle+totals.parking+totals.guide+totals.hotel+totals.guideHotel+totals.meals+totals.driverMeal+totals.tickets+totals.custom+trainCost+transferCost;
  const perPerson=Math.round(grandTotal/ppl);
  const perPersonCny=Math.round(perPerson/13);
  const totalCny=Math.round(grandTotal/13);
  
  // Render summary
  let h=`<div style="font-size:12px;color:#888;margin-bottom:8px;">
    ${ppl}人 · ${rooms}间房 · ${HOTEL_NAMES[hotelStar()]} · ${VEHICLE_NAMES[vehicle()]}${isPeak()?' · 🌞旺季+15%':''}
    · 含导游/司机住宿
  </div>
  <table class="qt">
    <thead><tr><th>费用项目</th><th>金额(₽)</th><th>人均(₽)</th><th>人民币</th></tr></thead>
    <tbody>

// ===== 生成文档 =====
function genDoc(){
  const ppl=people(),rooms=Math.ceil(ppl/2),hs=hotelStar(),veh=vehicle(),peak=isPeak();
  const totalDays=dayData.length;
  
  if(totalDays===0){toast('请先配置行程');return}
  
  // Recalculate
  let dayCosts=[];
  let totals={vehicle:0,parking:0,guide:0,hotel:0,guideHotel:0,meals:0,tickets:0,driverMeal:0,custom:0};
  
  dayData.forEach((day,idx)=>{
    const mt=day.meals.mealType||'cn';
    const lunchPrice=mt==='cn'?PRICE.meal.lunch_cn:PRICE.meal.lunch_ru;
    const dinnerPrice=mt==='cn'?PRICE.meal.dinner_cn:(mt==='ru'?PRICE.meal.dinner_ru:PRICE.meal.dinner_cn);
    const vCost=PRICE.vehicle[veh]||2500;
    const hCost=PRICE.hotel[hs]||7000;
    const ghCost=PRICE.guideHotel[hs]||7500;
    const dhCost=PRICE.driverHotel[hs]||5500;
    const pm=peak?1.15:1;
    
    let v=day.vehicleHours*vCost*pm;
    let pk=day.parkingFee;
    let g=day.guideCost;
    let ho=(day.type!=='departure')?hCost*rooms:0;
    let gh=(day.type!=='departure')?ghCost+dhCost:0;
    if(day._extraHotels>0)gh+=hCost*day._extraHotels;
    let ml=(day.meals.lunch?lunchPrice*ppl:0)+(day.meals.dinner?dinnerPrice*ppl:0);
    let dm=(day.meals.lunch?PRICE.driverMeal:0)+(day.meals.dinner?PRICE.driverMeal:0);
    let tk=day.attractions.reduce((s,a)=>s+a.cost*ppl,0);
    let cu=day.customCost;
    let total=v+pk+g+ho+gh+ml+dm+tk+cu;
    
    dayCosts.push({day:day.day,idx,label:day.label,city:CITY_NAMES[day.city]||day.city,date:day.date,weekday:day.weekday,
      attractions:day.attractions,meals:day.meals,mealType:mt,
      vehicleHours:day.vehicleHours,type:day.type,customNote:day.customNote,
      vehicle:v,parking:pk,guide:g,hotel:ho,guideHotel:gh,meals:ml,driverMeal:dm,tickets:tk,custom:cu,total});
    
    totals.vehicle+=v;totals.parking+=pk;totals.guide+=g;totals.hotel+=ho;totals.guideHotel+=gh;
    totals.meals+=ml;totals.driverMeal+=dm;totals.tickets+=tk;totals.custom+=cu;

  let trainCost=0,transferCost=0;
  const hasMoscow=selectedCities.includes('moscow');
  const hasSpb=selectedCities.includes('spb');

    const trips=dayData.some(d=>d.type==='transfer_out')?2:1;

  dayData.forEach(d=>{if(['arrival','departure','transfer_in','transfer_out'].includes(d.type))transferCost+=PRICE.transfer});
  
  const grandTotal=totals.vehicle+totals.parking+totals.guide+totals.hotel+totals.guideHotel+totals.meals+totals.driverMeal+totals.tickets+totals.custom+trainCost+transferCost;

  // Simple formatted table

// ===== 保存/载入 =====
function saveToFile(){
  const state={selectedCities,dayData,f_name:$g('f_name').value,f_client:$g('f_client').value,
    f_people:$g('f_people').value,f_days:$g('f_days').value,f_depart:$g('f_depart').value,
    f_hotel:$g('f_hotel').value,f_vehicle:$g('f_vehicle').value,f_peak:$g('f_peak').value};
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`俄旅方案_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('✅ 方案已保存');
}

function loadFromFile(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='.json';
  input.onchange=async(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    const text=await file.text();
    try{
      const state=JSON.parse(text);
      if(state.selectedCities)selectedCities=state.selectedCities;
      if(state.dayData)dayData=state.dayData;
      if(state.f_name)$g('f_name').value=state.f_name;
      if(state.f_client)$g('f_client').value=state.f_client;
      if(state.f_people)$g('f_people').value=state.f_people;
      if(state.f_days)$g('f_days').value=state.f_days;
      if(state.f_depart)$g('f_depart').value=state.f_depart;
      if(state.f_hotel)$g('f_hotel').value=state.f_hotel;
      if(state.f_vehicle)$g('f_vehicle').value=state.f_vehicle;
      if(state.f_peak)$g('f_peak').value=state.f_peak;
      initCities();
      renderDays();
      calcPrice();
      toast('✅ 方案已载入');
    }catch(e){toast('❌ 文件格式错误');}
  };
  input.click();
}

  .then(function(r){return r.json()})

    if(d.error){am('❌ '+d.error.message,'a');return}
    var t=d.choices[0].message.content;
    if(t.indexOf('【填表】')>=0){var p=t.split('【填表】');if(p[0].trim())am(p[0],'a');ch.push({role:'assistant',content:t});pf(p[1])}
    else{am(t,'a');ch.push({role:'assistant',content:t})}})
  .catch(function(e){rp();bs();var m=e.message||'未知错误';if(m.indexOf('401')>=0)m='API Key无效';if(m.indexOf('429')>=0)m='请求太频繁';am('❌ '+m,'a')})}
function pf(j){try{j=j.trim();var o=JSON.parse(j);
  if(o.basic){if(o.basic.people)$g('f_ppl').value=o.basic.people;if(o.basic.days)$g('f_days').value=o.basic.days;
    if(o.basic.hotel)$g('f_hotel').value=o.basic.hotel;if(o.basic.vehicle)$g('f_veh').value=o.basic.vehicle;
    if(o.basic.peak!==undefined)$g('f_peak').value=o.basic.peak?'1':'0';if(o.basic.client)$g('f_client').value=o.basic.client}
  if(o.cities&&o.cities.length){selected=o.cities;renderPool()}
  if(o.cityDays&&o.cities){renderOrder();o.cities.forEach(function(k){var e=$g('cd_'+k);if(e&&o.cityDays[k])e.value=o.cityDays[k]});updateCityTip()}
  if(o.days&&o.days.length){dayData=o.days.map(function(d,i){var dt=new Date(2026,6,11+i);return{day:i+1,date:(dt.getMonth()+1)+'/'+dt.getDate(),weekday:W[dt.getDay()],city:d.city,type:d.type||'sightseeing',label:d.label||'',attrs:(d.attrs||[]).map(function(id){var ca=ATTR[d.city]||[];var f=ca.find(function(a){return a.id===id});return f||{id:id,name:id,c:0}}),meals:d.meals||{bf:true,lu:true,dn:false,mt:'cn'},vh:d.vh||10,pk:2500,gc:(d.type==='arrival'||d.type==='departure')?P.gHalf:P.gFull,cc:0,cn:'',ex:0}})}
  renderDays();calcPrice();toast('✅ AI已配置行程！');$g('dayEditor').scrollIntoView({behavior:'smooth'})
}catch(e){toast('❌ 解析失败: '+e.message)}}
